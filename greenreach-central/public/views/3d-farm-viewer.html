<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GreenReach 3D Farm Viewer</title>
<link rel="stylesheet" href="/css/global.css" />
<link rel="stylesheet" href="/css/farm-app.css" />
<style>
  :root {
    --v3d-bg: #05080d;
    --v3d-panel: rgba(10, 16, 24, 0.78);
    --v3d-panel-border: rgba(99, 179, 237, 0.18);
    --v3d-text: #e6edf6;
    --v3d-muted: #8aa0b8;
    --v3d-accent: #4dd0a3;
    --v3d-accent-2: #6ab1ff;
    --v3d-warn: #f5b86b;
    --v3d-bad: #ff6b7a;
  }
  html, body { background: var(--v3d-bg); color: var(--v3d-text); margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
  #v3d-stage { position: fixed; inset: 0; }
  #v3d-canvas { display: block; width: 100%; height: 100%; outline: none; cursor: grab; }
  #v3d-canvas.dragging { cursor: grabbing; }
  #v3d-canvas.editing { cursor: crosshair; }
  .v3d-topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 10px 16px;
    background: linear-gradient(180deg, rgba(5,8,13,0.85) 0%, rgba(5,8,13,0) 100%);
    pointer-events: none;
  }
  .v3d-topbar > * { pointer-events: auto; }
  .v3d-title { font-weight: 600; font-size: 14px; letter-spacing: 0.02em; }
  .v3d-title .v3d-sub { color: var(--v3d-muted); font-weight: 400; margin-left: 6px; }
  .v3d-spacer { flex: 1; }
  .v3d-btn {
    background: rgba(15, 23, 35, 0.85);
    color: var(--v3d-text);
    border: 1px solid var(--v3d-panel-border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
  }
  .v3d-btn:hover { background: rgba(30, 45, 65, 0.95); border-color: rgba(106, 177, 255, 0.55); }
  .v3d-btn:active { transform: translateY(1px); }
  .v3d-btn.active { background: rgba(106, 177, 255, 0.22); border-color: rgba(106, 177, 255, 0.7); color: #ffffff; }
  .v3d-btn--primary { background: linear-gradient(180deg, #2bb27a, #1d8c5d); border-color: #1d8c5d; color: #ffffff; }
  .v3d-btn--primary:hover { background: linear-gradient(180deg, #34c98a, #239f6a); }
  .v3d-select {
    background: rgba(15,23,35,0.85); color: var(--v3d-text);
    border: 1px solid var(--v3d-panel-border); border-radius: 8px;
    padding: 6px 10px; font-size: 12px;
  }
  .v3d-side {
    position: fixed; top: 56px; right: 12px; width: 340px; max-height: calc(100vh - 80px);
    background: var(--v3d-panel);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--v3d-panel-border);
    border-radius: 12px;
    z-index: 9;
    display: flex; flex-direction: column;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
  }
  .v3d-side__head { display:flex; align-items:center; gap:8px; padding: 12px 14px; border-bottom: 1px solid var(--v3d-panel-border); }
  .v3d-side__title { font-size: 13px; font-weight: 600; }
  .v3d-side__count { color: var(--v3d-muted); font-size: 12px; }
  .v3d-side__body { padding: 12px 14px; overflow-y: auto; flex: 1; }
  .v3d-side__row { display:flex; flex-direction:column; gap:6px; padding: 10px 0; border-bottom: 1px dashed rgba(99,179,237,0.12); }
  .v3d-side__row:last-child { border-bottom: 0; }
  .v3d-side__section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--v3d-muted); margin-bottom: 4px; }
  .v3d-kv { display:flex; justify-content: space-between; gap: 10px; font-size: 12px; }
  .v3d-kv > span:first-child { color: var(--v3d-muted); }
  .v3d-kv .v3d-ok { color: var(--v3d-accent); }
  .v3d-kv .v3d-bad { color: var(--v3d-bad); }
  .v3d-room-list { display:flex; flex-direction:column; gap: 8px; }
  .v3d-room-card { padding: 8px 10px; background: rgba(15,23,35,0.55); border: 1px solid var(--v3d-panel-border); border-radius: 8px; }
  .v3d-room-card h4 { margin: 0 0 6px 0; font-size: 12px; font-weight: 600; }
  .v3d-actions { display:flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--v3d-panel-border); }
  .v3d-actions .v3d-btn { padding: 6px 10px; font-size: 12px; }
  .v3d-legend {
    position: fixed; left: 12px; bottom: 12px; right: 12px; z-index: 9;
    background: var(--v3d-panel);
    border: 1px solid var(--v3d-panel-border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-size: 12px;
  }
  .v3d-legend__chip { display:inline-flex; align-items:center; gap:6px; color: var(--v3d-muted); }
  .v3d-legend__sw { width: 10px; height: 10px; border-radius: 3px; display:inline-block; }
  .v3d-heatkey { display: none; align-items: center; gap: 8px; }
  .v3d-heatkey.show { display: inline-flex; }
  .v3d-heatkey__ramp { width: 120px; height: 10px; border-radius: 6px; background: linear-gradient(90deg, #2c4dff 0%, #4dd0a3 40%, #f5b86b 70%, #ff5a5a 100%); border: 1px solid var(--v3d-panel-border); }
  .v3d-toast {
    position: fixed; left: 50%; top: 60px; transform: translateX(-50%);
    background: var(--v3d-panel); border: 1px solid var(--v3d-panel-border);
    color: var(--v3d-text); padding: 8px 14px; border-radius: 999px;
    font-size: 12px; z-index: 11;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    opacity: 0; transition: opacity 200ms ease;
    pointer-events: none;
  }
  .v3d-toast.show { opacity: 1; }
  .v3d-loading {
    position: fixed; inset: 0; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at center, #0d1622 0%, #05080d 70%);
    color: var(--v3d-muted); font-size: 14px; z-index: 20;
    transition: opacity 400ms ease;
  }
  .v3d-loading.hide { opacity: 0; pointer-events: none; }
  .v3d-loading .spin {
    width: 28px; height: 28px; border: 2px solid rgba(106,177,255,0.25);
    border-top-color: var(--v3d-accent-2); border-radius: 50%;
    animation: v3dspin 1s linear infinite; margin-right: 12px;
  }
  @keyframes v3dspin { to { transform: rotate(360deg); } }
  .v3d-empty { padding: 16px; color: var(--v3d-muted); font-size: 12px; line-height: 1.5; text-align:center; }
  .v3d-tag { display:inline-block; padding: 2px 6px; border-radius: 4px; font-size: 11px; background: rgba(106,177,255,0.12); color: var(--v3d-accent-2); }
  .v3d-tag--ok { background: rgba(77,208,163,0.15); color: var(--v3d-accent); }
  .v3d-viewmode { display:inline-flex; border: 1px solid var(--v3d-panel-border); border-radius: 8px; overflow: hidden; }
  .v3d-viewmode button { background: transparent; color: var(--v3d-muted); border: 0; padding: 6px 10px; font-size: 12px; cursor: pointer; }
  .v3d-viewmode button.active { background: rgba(106,177,255,0.15); color: var(--v3d-text); }
  #v3dMarquee {
    position: fixed; display: none; pointer-events: none; z-index: 8;
    border: 1.5px solid rgba(106,177,255,0.85);
    background: rgba(106,177,255,0.12);
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="v3d-stage"><canvas id="v3d-canvas"></canvas></div>
<div id="v3dMarquee"></div>
<div class="v3d-topbar">
  <div class="v3d-title">GreenReach Farm <span class="v3d-sub" id="v3dSubtitle">loading...</span></div>
  <div class="v3d-spacer"></div>
  <div class="v3d-viewmode" role="tablist">
    <button data-view="iso" class="active">Iso</button>
    <button data-view="top">Top</button>
    <button data-view="walk">Walk</button>
  </div>
  <button class="v3d-btn" id="v3dFitBtn" title="Fit view">Fit</button>
  <button class="v3d-btn" id="v3dEditBtn" title="Edit mode (E) - drag systems to reposition">Edit</button>
  <button class="v3d-btn" id="v3dHeatBtn" title="Heatmap overlay (H)">Heatmap</button>
  <select class="v3d-select" id="v3dHeatMetric" title="Heatmap metric">
    <option value="tempC">Temp</option>
    <option value="rh">RH</option>
    <option value="vpd">VPD</option>
  </select>
  <button class="v3d-btn v3d-btn--primary" id="v3dGrowBtn">Grow Management</button>
</div>
<aside class="v3d-side">
  <div class="v3d-side__head">
    <div class="v3d-side__title" id="v3dSideTitle">Farm summary</div>
    <div class="v3d-spacer"></div>
    <div class="v3d-side__count" id="v3dSideCount"></div>
  </div>
  <div class="v3d-side__body" id="v3dSideBody">
    <div class="v3d-empty">Loading...</div>
  </div>
  <div class="v3d-actions" id="v3dSideActions" hidden>
    <button class="v3d-btn" data-action="assign-light">Assign light</button>
    <button class="v3d-btn" data-action="assign-controller">Assign controller</button>
    <button class="v3d-btn" data-action="calibrate">Calibrate</button>
    <button class="v3d-btn" data-action="open-grow">Open in Grow Mgmt</button>
  </div>
</aside>
<div class="v3d-legend">
  <span class="v3d-legend__chip"><span class="v3d-legend__sw" style="background:#4dd0a3"></span> Active</span>
  <span class="v3d-legend__chip"><span class="v3d-legend__sw" style="background:#6ab1ff"></span> Selected</span>
  <span class="v3d-legend__chip"><span class="v3d-legend__sw" style="background:#f5b86b"></span> Needs attention</span>
  <span class="v3d-legend__chip" id="v3dStats">0 rooms / 0 zones / 0 systems</span>
  <span class="v3d-heatkey" id="v3dHeatKey">
    <span class="v3d-legend__chip" style="color:var(--v3d-text);">Heatmap</span>
    <span id="v3dHeatLo" style="color:var(--v3d-muted);">--</span>
    <span class="v3d-heatkey__ramp"></span>
    <span id="v3dHeatHi" style="color:var(--v3d-muted);">--</span>
  </span>
  <span class="v3d-heatkey" id="v3dHeatMode" style="margin-left:auto;"></span>
</div>
<div class="v3d-toast" id="v3dToast"></div>
<div class="v3d-loading" id="v3dLoading"><span class="spin"></span><span>Building scene...</span></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
} }
</script>
<script type="module" src="/js/3d-farm-viewer-v2.js"></script>
</body>
</html>
