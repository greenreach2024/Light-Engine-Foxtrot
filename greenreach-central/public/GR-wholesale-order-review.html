<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Review Order Modifications</title>
  <style>
    :root {
      --primary: #2d5016;
      --accent: #82c341;
      --bg: #f5f7f3;
      --surface: #ffffff;
      --border: #d8e3cf;
      --text: #1a1a1a;
      --text-secondary: #5a5a5a;
      --error: #c53030;
      --success: #38a169;
      --warning: #d69e2e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 1.5rem 2rem;
    }

    .container {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .alert {
      background: #fff3cd;
      border: 2px solid var(--warning);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .alert h2 {
      color: var(--warning);
      margin-bottom: 0.5rem;
    }

    .review-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .farm-section {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 2px solid var(--border);
    }

    .farm-section:last-child {
      border-bottom: none;
    }

    .farm-name {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
    }

    .comparison-table th {
      background: var(--bg);
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid var(--border);
    }

    .comparison-table td {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .changed {
      background: #fff3cd;
    }

    .original-value {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    .new-value {
      font-weight: 600;
      color: var(--warning);
    }

    .reason-box {
      background: var(--bg);
      border-left: 4px solid var(--warning);
      padding: 1rem;
      margin: 1rem 0;
    }

    .totals-comparison {
      display: flex;
      justify-content: space-between;
      padding: 1rem;
      background: var(--bg);
      border-radius: 6px;
      margin: 1rem 0;
    }

    .total-item {
      text-align: center;
    }

    .total-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .total-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .total-original {
      color: var(--text-secondary);
    }

    .total-new {
      color: var(--primary);
    }

    .savings {
      color: var(--success);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .btn {
      flex: 1;
      padding: 1rem 2rem;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-success {
      background: var(--success);
      color: white;
    }

    .btn-success:hover {
      background: #2f855a;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--error);
      color: white;
    }

    .btn-danger:hover {
      background: #9b2c2c;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <header>
    <h1>Review Order Modifications</h1>
    <p>Some farms have adjusted your order quantities</p>
  </header>

  <div class="container">
    <div class="alert">
      <h2>Action Required</h2>
      <p>
        One or more farms have modified your order quantities due to availability constraints. 
        Please review the changes below and decide whether to accept or reject the modified order.
      </p>
    </div>

    <div class="review-card" id="review-content">
      <!-- Content populated by JavaScript -->
    </div>

    <div class="action-buttons">
      <button class="btn btn-success" onclick="acceptModifications()">
        Accept Modified Order
      </button>
      <button class="btn btn-danger" onclick="rejectModifications()">
        Reject & Cancel Order
      </button>
    </div>
  </div>

  <script>
    const orderId = new URLSearchParams(window.location.search).get('order_id');
    let orderData = null;

    async function loadOrderReview() {
      try {
        const response = await fetch(`/api/wholesale/orders/${orderId}`);
        const data = await response.json();
        
        if (data.ok) {
          orderData = data.order;
          renderReview(orderData);
        }
      } catch (error) {
        console.error('Failed to load order:', error);
      }
    }

    function renderReview(order) {
      const content = document.getElementById('review-content');
      
      let originalTotal = 0;
      let newTotal = 0;
      let html = '';

      order.sub_orders.forEach(subOrder => {
        if (subOrder.status !== 'farm_modified') return;

        html += `
          <div class="farm-section">
            <div class="farm-name">${subOrder.farm_name}</div>
            
            <div class="reason-box">
              <strong>Reason for Modifications:</strong><br/>
              ${subOrder.modification_reason || 'Not provided'}
            </div>

            <table class="comparison-table">
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Original Qty</th>
                  <th>New Qty</th>
                  <th>Original Price</th>
                  <th>New Price</th>
                </tr>
              </thead>
              <tbody>
                ${subOrder.items.map(item => {
                  const changed = item.modified_quantity !== null && item.modified_quantity !== item.original_quantity;
                  const origQty = item.original_quantity || item.quantity;
                  const newQty = item.modified_quantity !== null ? item.modified_quantity : item.quantity;
                  const origPrice = origQty * item.price_per_unit;
                  const newPrice = newQty * item.price_per_unit;
                  
                  originalTotal += origPrice;
                  newTotal += newPrice;

                  return `
                    <tr class="${changed ? 'changed' : ''}">
                      <td>${item.product_name}</td>
                      <td ${changed ? 'class="original-value"' : ''}>${origQty} ${item.unit}</td>
                      <td ${changed ? 'class="new-value"' : ''}>${newQty} ${item.unit}</td>
                      <td ${changed ? 'class="original-value"' : ''}>$${origPrice.toFixed(2)}</td>
                      <td ${changed ? 'class="new-value"' : ''}>$${newPrice.toFixed(2)}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      });

      const savings = originalTotal - newTotal;

      html += `
        <div class="totals-comparison">
          <div class="total-item">
            <div class="total-label">Original Total</div>
            <div class="total-value total-original">$${originalTotal.toFixed(2)}</div>
          </div>
          <div class="total-item">
            <div class="total-label">New Total</div>
            <div class="total-value total-new">$${newTotal.toFixed(2)}</div>
          </div>
          <div class="total-item">
            <div class="total-label">${savings >= 0 ? 'Savings' : 'Increase'}</div>
            <div class="total-value ${savings >= 0 ? 'savings' : 'total-new'}">
              ${savings >= 0 ? '-' : '+'}$${Math.abs(savings).toFixed(2)}
            </div>
          </div>
        </div>
      `;

      content.innerHTML = html;
    }

    async function acceptModifications() {
      if (!confirm('Accept the modified order? Your payment authorization will be adjusted.')) return;

      try {
        const response = await fetch('/api/wholesale/orders/buyer-review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            order_id: parseInt(orderId),
            action: 'accept'
          })
        });

        const data = await response.json();
        
        if (data.ok) {
          alert('Order approved! Farms will prepare your items for pickup.');
          window.location.href = '/LE-farm-admin.html?view=wholesale-orders';
        } else {
          alert('Failed to approve order: ' + data.message);
        }
      } catch (error) {
        console.error('Accept error:', error);
        alert('Failed to approve order');
      }
    }

    async function rejectModifications() {
      if (!confirm('Reject the modified order? The entire order will be cancelled and your payment authorization released.')) return;

      const reason = prompt('Please provide a reason for rejection (optional):');

      try {
        const response = await fetch('/api/wholesale/orders/buyer-review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            order_id: parseInt(orderId),
            action: 'reject',
            rejection_reason: reason
          })
        });

        const data = await response.json();
        
        if (data.ok) {
          alert('Order cancelled. Your payment authorization has been released.');
          window.location.href = '/LE-farm-admin.html?view=wholesale-orders';
        } else {
          alert('Failed to cancel order: ' + data.message);
        }
      } catch (error) {
        console.error('Reject error:', error);
        alert('Failed to cancel order');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (!orderId) {
        alert('No order ID provided');
        window.location.href = '/LE-farm-admin.html';
        return;
      }
      loadOrderReview();
    });
  </script>
</body>
</html>
