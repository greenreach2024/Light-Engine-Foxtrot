<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="DWC shallow pond, 4 by 8 feet">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.0" r="1">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  <rect x="60" y="40" width="520" height="6" rx="2" fill="url(#bar)"/>
  <rect x="60" y="40" width="520" height="80" fill="url(#glow)"/>
  <g transform="translate(60,140)">
    <polygon points="0,0 520,0 500,160 20,160" fill="url(#water)" stroke="#0c4a6e" stroke-width="3"/>
    <g fill="#86efac" opacity="0.95">
      <!-- Floating raft dots: 4 rows x 10 columns for 40 positions -->
      <g transform="translate(40,20)">
        <circle r="10"/><circle cx="50" r="10"/><circle cx="100" r="10"/><circle cx="150" r="10"/><circle cx="200" r="10"/><circle cx="250" r="10"/><circle cx="300" r="10"/><circle cx="350" r="10"/><circle cx="400" r="10"/><circle cx="450" r="10"/>
      </g>
      <g transform="translate(36,60)">
        <circle r="10"/><circle cx="50" r="10"/><circle cx="100" r="10"/><circle cx="150" r="10"/><circle cx="200" r="10"/><circle cx="250" r="10"/><circle cx="300" r="10"/><circle cx="350" r="10"/><circle cx="400" r="10"/><circle cx="450" r="10"/>
      </g>
      <g transform="translate(32,100)">
        <circle r="10"/><circle cx="50" r="10"/><circle cx="100" r="10"/><circle cx="150" r="10"/><circle cx="200" r="10"/><circle cx="250" r="10"/><circle cx="300" r="10"/><circle cx="350" r="10"/><circle cx="400" r="10"/><circle cx="450" r="10"/>
      </g>
      <g transform="translate(28,140)">
        <circle r="10"/><circle cx="50" r="10"/><circle cx="100" r="10"/><circle cx="150" r="10"/><circle cx="200" r="10"/><circle cx="250" r="10"/><circle cx="300" r="10"/><circle cx="350" r="10"/><circle cx="400" r="10"/><circle cx="450" r="10"/>
      </g>
    </g>
  </g>
</svg>
