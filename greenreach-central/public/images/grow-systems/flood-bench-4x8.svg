<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Ebb-and-flow flood bench, 4 by 8 feet">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bench" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.0" r="1">
      <stop offset="0" stop-color="#fde68a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fde68a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#sky)"/>
  <rect x="80" y="40" width="480" height="6" rx="2" fill="url(#bar)"/>
  <rect x="80" y="40" width="480" height="80" fill="url(#glow)"/>
  <g transform="translate(80,150)">
    <polygon points="0,0 480,0 500,80 -20,80" fill="url(#bench)" stroke="#0f172a" stroke-width="2"/>
    <rect x="20" y="12" width="440" height="50" rx="4" fill="#0ea5e9" opacity="0.4"/>
    <g fill="#4ade80">
      <g transform="translate(40,36)">
        <circle r="8"/><circle cx="60" r="8"/><circle cx="120" r="8"/><circle cx="180" r="8"/><circle cx="240" r="8"/><circle cx="300" r="8"/><circle cx="360" r="8"/><circle cx="420" r="8"/>
      </g>
    </g>
    <rect x="-30" y="80" width="540" height="12" rx="3" fill="#334155"/>
  </g>
</svg>
