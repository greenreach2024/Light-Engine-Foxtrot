name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, feature/inventory-and-forecasting-system ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate demo data
        run: |
          bash scripts/setup-demo.sh
          echo "Demo data generated"
      
      - name: Create static demo config
        run: |
          # Create a config file for static demo mode
          cat > public/demo-config.js << 'EOF'
          // Static demo configuration for GitHub Pages
          window.DEMO_MODE = true;
          window.STATIC_DEMO = true;
          window.API_BASE = window.location.origin + '/Light-Engine-Delta';
          console.log('[Demo Config] Static demo mode enabled');
          EOF
      
      - name: Update HTML files for GitHub Pages
        run: |
          # Add demo config script to index.html
          sed -i '/<head>/a\  <script src="./demo-config.js"><\/script>' public/index.html
          
          # Update base path for GitHub Pages subdirectory
          find public -name "*.html" -type f -exec sed -i 's|href="\/|href="\/Light-Engine-Delta\/|g' {} \;
          find public -name "*.html" -type f -exec sed -i 's|src="\/|src="\/Light-Engine-Delta\/|g' {} \;
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
