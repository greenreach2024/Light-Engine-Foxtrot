name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, feature/inventory-and-forecasting-system ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate demo data
        run: |
          bash scripts/setup-demo.sh
          echo "Demo data generated"
      
      - name: Create static demo config
        run: |
          # Create a config file for static demo mode
          mkdir -p public
          cat > public/demo-config.js << 'EOF'
          // Static demo configuration for GitHub Pages
          window.DEMO_MODE = true;
          window.STATIC_DEMO = true;
          window.API_BASE = window.location.origin + '/Light-Engine-Foxtrot';
          console.log('[Demo Config] Static demo mode enabled');
          EOF

      - name: Generate index.html for Pages if missing
        run: |
          # The canonical home page was removed in 054c55e2 when the landing UX
          # was consolidated into Admin, so GitHub Pages would 404 at the root.
          # Emit a lightweight directory listing that links to the top-level
          # HTML entry points so the Pages artifact always has an index.
          if [ ! -f public/index.html ]; then
            {
              echo '<!doctype html>'
              echo '<html lang="en"><head><meta charset="utf-8">'
              echo '<title>Light Engine Foxtrot — Static Demo</title>'
              echo '<script src="./demo-config.js"></script>'
              echo '<style>body{font-family:system-ui,sans-serif;max-width:720px;margin:2rem auto;padding:0 1rem;line-height:1.5;}li{margin:0.25rem 0;}</style>'
              echo '</head><body>'
              echo '<h1>Light Engine Foxtrot — Static Demo</h1>'
              echo '<p>Auto-generated entry index. Pick a surface below:</p><ul>'
              for f in public/*.html; do
                [ -f "$f" ] || continue
                name="$(basename "$f")"
                [ "$name" = "index.html" ] && continue
                echo "<li><a href=\"./$name\">$name</a></li>"
              done
              echo '</ul></body></html>'
            } > public/index.html
          fi

      - name: Update HTML files for GitHub Pages
        run: |
          # Inject the demo-config shim into index.html when it isn't already present.
          if [ -f public/index.html ] && ! grep -q 'demo-config.js' public/index.html; then
            sed -i '/<head>/a\  <script src="./demo-config.js"><\/script>' public/index.html
          fi

          # Rewrite absolute paths so assets resolve under the /Light-Engine-Foxtrot/ Pages prefix.
          find public -name "*.html" -type f -exec sed -i 's|href="\/|href="\/Light-Engine-Foxtrot\/|g' {} \;
          find public -name "*.html" -type f -exec sed -i 's|src="\/|src="\/Light-Engine-Foxtrot\/|g' {} \;
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
