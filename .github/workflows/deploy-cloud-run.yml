name: Deploy Cloud Run (buildx + digest-pinned)

# Production deploy flow:
# - Automatic on pushes to main touching deploy-relevant paths
# - Manual workflow_dispatch for explicit one-off deploys
#
# Authentication is via Workload Identity Federation — no long-lived
# service-account keys. Setup is documented in gcp/DEPLOY.md §WIF.

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-cloud-run.yml"
      - "gcp/deploy-cloud-run-buildx.sh"
      - "gcp/DEPLOY.md"
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "server-foxtrot.js"
      - "routes/**"
      - "lib/**"
      - "public/**"
      - "greenreach-central/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy (le, central, or both)"
        required: true
        default: both
        type: choice
        options:
          - both
          - le
          - central
      skip_build:
        description: "Skip build/push and redeploy existing image"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write   # required to mint the OIDC token that WIF exchanges for GCP creds
  contents: read

env:
  GCP_PROJECT_ID: project-5d00790f-13a9-4637-a40
  GCP_PROJECT_NUMBER: "1029387937866"
  GCP_REGION: us-east1
  WIF_POOL_ID: github
  WIF_PROVIDER_ID: greenreach2024
  WIF_SA_EMAIL: devin-deployer@project-5d00790f-13a9-4637-a40.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Enforce deploys only from main
        # Production deploys must always come from main. Blocks the
        # "manual deploy from a feature branch" footgun that produced
        # the 04-22 non-main production revisions. If you need to test
        # a branch, do it in a preview/staging flow, not this one.
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Refusing to deploy from ${GITHUB_REF}. This workflow only accepts refs/heads/main."
          echo "If you need this ref deployed, open a PR to main first."
          exit 1

      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.WIF_POOL_ID }}/providers/${{ env.WIF_PROVIDER_ID }}
          service_account: ${{ env.WIF_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy
        run: |
          set -euo pipefail
          chmod +x ./gcp/deploy-cloud-run-buildx.sh

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            FLAGS="--service ${{ inputs.service }}"
            if [[ "${{ inputs.skip_build }}" == "true" ]]; then
              FLAGS="$FLAGS --skip-build"
            fi
          else
            # Push-triggered deploys are full build+deploy of both services
            # to keep behavior deterministic and avoid stale live URLs.
            FLAGS="--service both"
          fi

          ./gcp/deploy-cloud-run-buildx.sh $FLAGS

      - name: Summary
        if: always()
        run: |
          DEPLOY_SERVICE="${{ github.event_name == 'workflow_dispatch' && inputs.service || 'both' }}"
          echo "### Cloud Run deploy — service: ${DEPLOY_SERVICE}" >> $GITHUB_STEP_SUMMARY
          for SVC in greenreach-central light-engine; do
            if [[ "${DEPLOY_SERVICE}" == "both" || "${DEPLOY_SERVICE}" == "le" && "$SVC" == "light-engine" || "${DEPLOY_SERVICE}" == "central" && "$SVC" == "greenreach-central" ]]; then
              URL=$(gcloud run services describe "$SVC" --region=${{ env.GCP_REGION }} --format='value(status.url)' 2>/dev/null || echo "<unresolved>")
              IMG=$(gcloud run services describe "$SVC" --region=${{ env.GCP_REGION }} --format='value(spec.template.spec.containers[0].image)' 2>/dev/null || echo "<unresolved>")
              REV=$(gcloud run services describe "$SVC" --region=${{ env.GCP_REGION }} --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo "<unresolved>")
              echo "- **$SVC**: rev \`$REV\` — $URL" >> $GITHUB_STEP_SUMMARY
              echo "  image: \`$IMG\`" >> $GITHUB_STEP_SUMMARY
            fi
          done
