name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  check:
    name: Typecheck + Lint + Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t light-engine-foxtrot:${{ github.sha }} .

  smoke-api:
    name: API Smoke Contract
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foxtrot
          POSTGRES_PASSWORD: foxtrot
          POSTGRES_DB: light_engine_foxtrot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foxtrot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare env
        run: |
          cp .env.example .env
          echo "DATABASE_URL=postgres://foxtrot:foxtrot@localhost:5432/light_engine_foxtrot" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Run migrations and seed
        run: |
          npm run migrate
          npm run seed

      - name: Start app
        run: nohup npx tsx src/index.ts > app.log 2>&1 &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App failed to become healthy"
          cat app.log
          exit 1

      - name: Run API smoke contract checks
        run: npm run smoke:api
