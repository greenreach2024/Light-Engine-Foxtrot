name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend dependencies (public)
        run: |
          cd public
          npm ci
      - name: Lint frontend
        run: |
          cd public
          npm run lint
      - name: Install server dependencies
        run: |
          npm ci
      - name: Validate data schemas
        run: |
          npm run validate-schemas
      - name: Run test suite
        run: |
          npm test
      - name: Run deterministic wholesale smoke suite
        run: |
          bash scripts/ci/run-wholesale-smokes.sh

  python-tests:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run Python tests
        run: pytest -q

  security-checks:
    runs-on: ubuntu-latest
    needs: validate-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Security and CORS static checks
        run: |
          # Verify CORS middleware exists
          if ! grep -q "Access-Control-Allow-Origin" server/middleware/cors.js; then
            echo "ERROR: CORS middleware missing expected headers"; exit 1
          fi
          # Verify rate limiting middleware exists
          if ! grep -q "createRateLimiter" server/middleware/rate-limiter.js; then
            echo "ERROR: Rate limiting middleware not found"; exit 1
          fi
          # Verify audit logging is present
          if ! grep -q "logAuditEvent" server/middleware/audit-logger.js; then
            echo "ERROR: Audit logging middleware not found"; exit 1
          fi
          echo "✅ Security checks passed"
