<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenReach Central - Farm Monitoring Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f1419;
      color: #e8eaed;
      line-height: 1.6;
    }
    
    .header {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #10b981;
    }
    
    .header .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      padding: 1.5rem;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .card-title {
      font-size: 0.875rem;
      font-weight: 500;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .card-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #e8eaed;
    }
    
    .card-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 0.5rem;
    }
    
    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .badge.online {
      background: #10b98120;
      color: #10b981;
    }
    
    .badge.offline {
      background: #ef444420;
      color: #ef4444;
    }
    
    .badge.degraded {
      background: #f59e0b20;
      color: #f59e0b;
    }
    
    .badge.inventory-only {
      background: #3b82f620;
      color: #3b82f6;
    }
    
    .badge.full {
      background: #8b5cf620;
      color: #8b5cf6;
    }
    
    .badge.enterprise {
      background: #ec489920;
      color: #ec4899;
    }
    
    .farms-table {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      overflow: hidden;
    }
    
    .table-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .table-title {
      font-size: 1.125rem;
      font-weight: 600;
    }
    
    .search-box {
      background: #0f1419;
      border: 1px solid #2d3748;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      color: #e8eaed;
      font-size: 0.875rem;
      width: 300px;
    }
    
    .search-box:focus {
      outline: none;
      border-color: #10b981;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      text-align: left;
      padding: 1rem 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      border-bottom: 1px solid #2d3748;
    }
    
    td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2d3748;
      font-size: 0.875rem;
    }
    
    tr:hover {
      background: #0f1419;
      cursor: pointer;
    }
    
    .farm-name {
      font-weight: 600;
      color: #10b981;
    }
    
    .farm-subdomain {
      color: #6b7280;
      font-size: 0.75rem;
    }
    
    .metric {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .metric-value {
      font-weight: 600;
    }
    
    .metric-label {
      font-size: 0.75rem;
      color: #6b7280;
    }
    
    .actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #10b981;
      color: white;
    }
    
    .btn-primary:hover {
      background: #059669;
    }
    
    .btn-secondary {
      background: #374151;
      color: #e8eaed;
    }
    
    .btn-secondary:hover {
      background: #4b5563;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .btn-danger:hover {
      background: #dc2626;
    }
    
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6b7280;
    }
    
    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #9ca3af;
    }
    
    .loader {
      text-align: center;
      padding: 3rem;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #2d3748;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 8px;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    
    .modal-title {
      font-size: 1.5rem;
      font-weight: 600;
    }
    
    .close-btn {
      background: none;
      border: none;
      color: #9ca3af;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
    }
    
    .close-btn:hover {
      color: #e8eaed;
    }
    
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .detail-item {
      padding: 1rem;
      background: #0f1419;
      border-radius: 6px;
    }
    
    .detail-label {
      font-size: 0.75rem;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
    }
    
    .detail-value {
      font-size: 1rem;
      font-weight: 500;
    }
    
    .logs-container {
      background: #0f1419;
      border-radius: 6px;
      padding: 1rem;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.75rem;
    }
    
    .log-entry {
      padding: 0.5rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      gap: 1rem;
    }
    
    .log-entry:last-child {
      border-bottom: none;
    }
    
    .log-time {
      color: #6b7280;
      min-width: 150px;
    }
    
    .log-level {
      min-width: 60px;
      font-weight: 600;
    }
    
    .log-level.error {
      color: #ef4444;
    }
    
    .log-level.warn {
      color: #f59e0b;
    }
    
    .log-level.info {
      color: #3b82f6;
    }
    
    .log-message {
      flex: 1;
      color: #e8eaed;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌱 GreenReach Central</h1>
    <div class="status">
      <div class="status-dot"></div>
      <span id="connectionStatus">Connected</span>
    </div>
  </div>

  <div class="container">
    <div class="summary-cards" id="summaryCards">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Total Farms</span>
        </div>
        <div class="card-value" id="totalFarms">—</div>
        <div class="card-subtitle">Across all deployments</div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Online</span>
        </div>
        <div class="card-value" id="onlineFarms">—</div>
        <div class="card-subtitle">Active in last 5 minutes</div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Revenue (30d)</span>
        </div>
        <div class="card-value" id="revenue30d">—</div>
        <div class="card-subtitle">From wholesale orders</div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Active Licenses</span>
        </div>
        <div class="card-value" id="activeLicenses">—</div>
        <div class="card-subtitle">Valid and active</div>
      </div>
    </div>

    <div class="farms-table">
      <div class="table-header">
        <h2 class="table-title">All Farms</h2>
        <input type="text" class="search-box" id="searchBox" placeholder="Search farms...">
      </div>
      
      <div id="farmsTableBody">
        <div class="loader">
          <div class="spinner"></div>
          <p>Loading farms...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="farmModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Farm Details</h3>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div id="modalBody">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const ADMIN_TOKEN = new URLSearchParams(window.location.search).get('token') || localStorage.getItem('adminToken') || 'dev-admin-token-change-in-production';
    
    if (!localStorage.getItem('adminToken')) {
      localStorage.setItem('adminToken', ADMIN_TOKEN);
    }
    
    let farms = [];
    let ws = null;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadSummary();
      loadFarms();
      connectWebSocket();
      
      document.getElementById('searchBox').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        renderFarms(farms.filter(f => 
          f.name.toLowerCase().includes(query) ||
          f.subdomain.toLowerCase().includes(query) ||
          f.email.toLowerCase().includes(query)
        ));
      });
    });
    
    // Load summary stats
    async function loadSummary() {
      try {
        const response = await fetch(`${API_BASE}/api/analytics/summary?timeframe=30d`, {
          headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          document.getElementById('totalFarms').textContent = data.summary.total_farms || 0;
          document.getElementById('onlineFarms').textContent = data.summary.active_farms || 0;
          document.getElementById('revenue30d').textContent = `$${(parseFloat(data.summary.revenue_period) || 0).toFixed(2)}`;
          document.getElementById('activeLicenses').textContent = data.summary.licenses?.active_licenses || 0;
        }
      } catch (error) {
        console.error('Failed to load summary:', error);
      }
    }
    
    // Load farms
    async function loadFarms() {
      try {
        const response = await fetch(`${API_BASE}/api/farms/status`, {
          headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          farms = data.farms;
          renderFarms(farms);
        } else {
          showError('Failed to load farms: ' + data.error);
        }
      } catch (error) {
        console.error('Failed to load farms:', error);
        showError('Network error: ' + error.message);
      }
    }
    
    // Render farms table
    function renderFarms(farmsToRender) {
      const container = document.getElementById('farmsTableBody');
      
      if (farmsToRender.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No farms found</h3>
            <p>No farms match your search criteria</p>
          </div>
        `;
        return;
      }
      
      const html = `
        <table>
          <thead>
            <tr>
              <th>Farm</th>
              <th>Status</th>
              <th>Tier</th>
              <th>Deployment</th>
              <th>Inventory</th>
              <th>Orders</th>
              <th>Revenue (30d)</th>
              <th>Last Seen</th>
            </tr>
          </thead>
          <tbody>
            ${farmsToRender.map(farm => `
              <tr onclick="showFarmDetails('${farm.id}')">
                <td>
                  <div class="farm-name">${escapeHtml(farm.name)}</div>
                  <div class="farm-subdomain">${escapeHtml(farm.subdomain)}.greenreach.io</div>
                </td>
                <td><span class="badge ${farm.status}">${farm.status}</span></td>
                <td><span class="badge ${farm.tier}">${farm.tier}</span></td>
                <td>${farm.deploymentMode || 'cloud'}</td>
                <td>${farm.metrics.inventoryCount} items</td>
                <td>${farm.metrics.pendingOrders} pending</td>
                <td>$${farm.metrics.revenue30d.toFixed(2)}</td>
                <td>${farm.lastSeenAt ? formatTime(farm.lastSeenAt) : 'Never'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      container.innerHTML = html;
    }
    
    // Show farm details modal
    async function showFarmDetails(farmId) {
      const modal = document.getElementById('farmModal');
      const modalBody = document.getElementById('modalBody');
      
      modal.classList.add('active');
      modalBody.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
      
      try {
        const response = await fetch(`${API_BASE}/api/farms/${farmId}/details`, {
          headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
        });
        
        const data = await response.json();
        
        if (data.ok) {
          const farm = data.farm;
          
          document.getElementById('modalTitle').textContent = farm.name;
          
          modalBody.innerHTML = `
            <div class="detail-grid">
              <div class="detail-item">
                <div class="detail-label">Subdomain</div>
                <div class="detail-value">${escapeHtml(farm.subdomain)}.greenreach.io</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Contact Email</div>
                <div class="detail-value">${escapeHtml(farm.contact_email || 'N/A')}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Tier</div>
                <div class="detail-value"><span class="badge ${farm.tier}">${farm.tier}</span></div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Deployment Mode</div>
                <div class="detail-value">${farm.deployment_mode || 'cloud'}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Created</div>
                <div class="detail-value">${formatDate(farm.created_at)}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Last Seen</div>
                <div class="detail-value">${farm.last_seen_at ? formatDate(farm.last_seen_at) : 'Never'}</div>
              </div>
            </div>
            
            ${farm.license ? `
              <h4 style="margin-bottom: 1rem;">License Information</h4>
              <div class="detail-grid">
                <div class="detail-item">
                  <div class="detail-label">Status</div>
                  <div class="detail-value">${farm.license.status}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Expires</div>
                  <div class="detail-value">${formatDate(farm.license.expiresAt)}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Update Channel</div>
                  <div class="detail-value">${farm.license.updateChannel || 'stable'}</div>
                </div>
                <div class="detail-item">
                  <div class="detail-label">Current Version</div>
                  <div class="detail-value">${farm.license.currentVersion || 'Unknown'}</div>
                </div>
              </div>
            ` : '<p style="color: #6b7280; margin-bottom: 1rem;">No license information</p>'}
            
            <h4 style="margin: 1.5rem 0 1rem;">Inventory & Orders</h4>
            <div class="detail-grid">
              <div class="detail-item">
                <div class="detail-label">Total Items</div>
                <div class="detail-value">${data.inventory.total_items || 0}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Available Quantity</div>
                <div class="detail-value">${data.inventory.total_quantity || 0}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Pending Orders</div>
                <div class="detail-value">${data.orders.pending || 0}</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Completed Orders</div>
                <div class="detail-value">${data.orders.completed || 0}</div>
              </div>
            </div>
            
            <div class="actions" style="margin-top: 2rem;">
              <button class="btn btn-primary" onclick="toggleFarmActive('${farm.id}', ${farm.active})">
                ${farm.active ? 'Deactivate' : 'Activate'} Farm
              </button>
              <button class="btn btn-secondary" onclick="changeTier('${farm.id}', '${farm.tier}')">
                Change Tier
              </button>
              <button class="btn btn-secondary" onclick="viewLogs('${farm.id}')">
                View Logs
              </button>
            </div>
          `;
        } else {
          modalBody.innerHTML = `<p style="color: #ef4444;">${data.error}</p>`;
        }
      } catch (error) {
        console.error('Failed to load farm details:', error);
        modalBody.innerHTML = `<p style="color: #ef4444;">Failed to load details: ${error.message}</p>`;
      }
    }
    
    // Close modal
    function closeModal() {
      document.getElementById('farmModal').classList.remove('active');
    }
    
    // Toggle farm active status
    async function toggleFarmActive(farmId, currentStatus) {
      if (!confirm(`Are you sure you want to ${currentStatus ? 'deactivate' : 'activate'} this farm?`)) {
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/api/farms/${farmId}/activate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ADMIN_TOKEN}`
          },
          body: JSON.stringify({ active: !currentStatus })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          alert(data.message);
          closeModal();
          loadFarms();
        } else {
          alert('Failed: ' + data.error);
        }
      } catch (error) {
        alert('Network error: ' + error.message);
      }
    }
    
    // Change tier
    async function changeTier(farmId, currentTier) {
      const tiers = ['inventory-only', 'full', 'enterprise'];
      const newTier = prompt(`Enter new tier (${tiers.join(', ')}):`, currentTier);
      
      if (!newTier || !tiers.includes(newTier)) {
        alert('Invalid tier');
        return;
      }
      
      try {
        const response = await fetch(`${API_BASE}/api/farms/${farmId}/tier`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ADMIN_TOKEN}`
          },
          body: JSON.stringify({ tier: newTier })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          alert(data.message);
          closeModal();
          loadFarms();
        } else {
          alert('Failed: ' + data.error);
        }
      } catch (error) {
        alert('Network error: ' + error.message);
      }
    }
    
    // View logs
    async function viewLogs(farmId) {
      alert('Logs viewer coming soon');
    }
    
    // WebSocket connection
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws/farms`);
      
      ws.onopen = () => {
        console.log('WebSocket connected');
        document.getElementById('connectionStatus').textContent = 'Connected';
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.type === 'update') {
          // Merge updates
          data.farms.forEach(updatedFarm => {
            const index = farms.findIndex(f => f.id === updatedFarm.id);
            if (index !== -1) {
              farms[index] = { ...farms[index], ...updatedFarm };
            }
          });
          
          renderFarms(farms);
        }
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        document.getElementById('connectionStatus').textContent = 'Connection error';
      };
      
      ws.onclose = () => {
        console.log('WebSocket disconnected');
        document.getElementById('connectionStatus').textContent = 'Disconnected';
        
        // Reconnect after 5 seconds
        setTimeout(connectWebSocket, 5000);
      };
    }
    
    // Helpers
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatTime(timestamp) {
      const date = new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (minutes < 1440) return `${Math.floor(minutes / 60)}h ago`;
      return `${Math.floor(minutes / 1440)}d ago`;
    }
    
    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleString();
    }
    
    function showError(message) {
      document.getElementById('farmsTableBody').innerHTML = `
        <div class="empty-state">
          <h3>Error</h3>
          <p>${escapeHtml(message)}</p>
        </div>
      `;
    }
    
    // Auto-refresh every 30 seconds
    setInterval(loadSummary, 30000);
  </script>
</body>
</html>
