version: "3.9"

services:
  # Light Engine Edge Application
  lightengine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lightengine-edge
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8091
      - PYTHON_PORT=8000
      - EDGE_MODE=true
      - DB_PATH=/app/data/lightengine.db
      - DEMO_MODE=false
      # Edge configuration
      - FARM_ID=${FARM_ID:-}
      - FARM_NAME=${FARM_NAME:-}
      - CENTRAL_API_URL=${CENTRAL_API_URL:-https://api.greenreach.com}
      - EDGE_API_KEY=${EDGE_API_KEY:-}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - HEARTBEAT_INTERVAL=${HEARTBEAT_INTERVAL:-30000}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300000}
    ports:
      - "8091:8091"  # Node.js Express
      - "8000:8000"  # FastAPI backend
    volumes:
      - lightengine_data:/app/data
      - lightengine_logs:/app/logs
      - lightengine_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/api/edge/status"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - lightengine_network

volumes:
  lightengine_data:
    driver: local
  lightengine_logs:
    driver: local
  lightengine_uploads:
    driver: local

networks:
  lightengine_network:
    driver: bridge
