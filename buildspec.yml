version: 0.2

# Cloud SaaS deployment — build Central + Foxtrot frontend
# The Procfile starts: cd greenreach-central && npm start
# Central server.js serves both API routes and public/ HTML pages

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - node --version
      - npm --version
  
  pre_build:
    commands:
      - echo "Running pre-build checks..."
      - cd greenreach-central && npm ci --production
      - cd ..
      - echo "Verifying critical files..."
      - ls -la greenreach-central/server.js
      - ls -la greenreach-central/lib/farm-data-store.js
      - ls -la public/js/api-config.js
  
  build:
    commands:
      - echo "Build phase — no transpile step needed for Node.js"
      - echo "Deployment mode: cloud (multi-tenant SaaS)"
  
  post_build:
    commands:
      - echo "Post-build — deployment package ready"

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - node_modules/**/*
    - .git/**/*
    - .github/**/*
    - tests/**/*
    - docs/**/*
    - '*.md'
    - .env*
    - '*.log'
    - light-engine.ARCHIVE-*/**/*
    - aws-testing/**/*
    - aws-infrastructure/**/*
    - scripts/deploy-*.sh
    - '*.har'
