<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Vitality Dashboard - Light Engine</title>
    <script src="/auth-guard.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --border: #2d3748;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a2332 100%);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* Page Header Navigation */
        .page-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-blue);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #60a5fa;
            letter-spacing: -0.5px;
        }

        .page-header .subtitle {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .nav-btn {
            background: rgba(59, 130, 246, 0.2);
            border: 2px solid var(--accent-blue);
            color: #93c5fd;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 100px;
            height: 44px;
            text-align: center;
        }

        .nav-btn:hover {
            background: rgba(59, 130, 246, 0.35);
            transform: scale(1.05);
        }

        .nav-btn.home {
            background: rgba(16, 185, 129, 0.2);
            border-color: var(--accent-green);
            color: #6ee7b7;
        }

        .nav-btn.home:hover {
            background: rgba(16, 185, 129, 0.35);
        }

        .nav-btn.settings {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-purple);
            color: #c4b5fd;
        }

        .nav-btn.settings:hover {
            background: rgba(139, 92, 246, 0.35);
        }

        /* Main Container */
        .container {
            position: relative;
            width: 100%;
            height: calc(100vh - 88px);
            overflow: hidden;
        }

        /* View Container */
        .view-container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* View Controls */
        .view-controls {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 50;
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .view-btn {
            background: rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(59, 130, 246, 0.5);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            text-align: center;
        }

        .view-btn:hover {
            background: rgba(59, 130, 246, 0.5);
            border-color: var(--accent-blue);
            color: var(--text-primary);
        }

        .view-btn.active {
            background: rgba(59, 130, 246, 0.8);
            border-color: var(--accent-blue);
            color: white;
        }

        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: rgba(26, 35, 50, 0.98);
            border-left: 2px solid var(--accent-blue);
            backdrop-filter: blur(20px);
            z-index: 200;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 2rem;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-panel h2 {
            color: #60a5fa;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .settings-group {
            margin-bottom: 2rem;
        }

        .settings-group h3 {
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        .setting-item {
            margin-bottom: 1.5rem;
        }

        .setting-item label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .setting-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .setting-item input[type="number"],
        .setting-item select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .setting-item input[type="number"]:focus,
        .setting-item select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
        }

        /* Status Bar (bottom) */
        .status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
        }

        .status-bar .last-updated {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .status-bar .overall-score {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .status-bar .data-freshness {
            display: flex;
            gap: 1rem;
        }

        .freshness-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .freshness-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .freshness-dot.fresh { background: var(--accent-green); }
        .freshness-dot.acceptable { background: var(--accent-yellow); }
        .freshness-dot.stale { background: var(--accent-red); }
        .freshness-dot.no_data { background: var(--text-muted); }

        /* View Canvases */
        .view-canvas {
            display: none;
            width: 100%;
            height: 100%;
        }

        .view-canvas.active {
            display: block;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Loading State */
        .loading {
            text-align: center;
            color: var(--text-secondary);
        }

        .loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error State */
        .error {
            text-align: center;
            color: var(--accent-red);
            padding: 2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }

            .view-controls {
                flex-direction: column;
                width: auto;
                padding: 0.75rem;
            }

            .settings-panel {
                width: 100%;
                right: -100%;
            }

            .status-bar {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <!-- Header Navigation -->
    <div class="page-header">
        <div>
            <h1 id="farmNameHeader">Farm Vitality</h1>
            <div class="subtitle">Real-time farm health visualization</div>
        </div>
        <div class="header-actions">
            <a href="/index.charlie.html" class="nav-btn home">Home</a>
            <button class="nav-btn settings" onclick="toggleSettings()">Settings</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- View Controls -->
        <div class="view-controls" id="viewControls">
            <button class="view-btn active" data-view="rings" onclick="switchView('rings')">
                Rings
            </button>
            <button class="view-btn" data-view="heartbeat" onclick="switchView('heartbeat')">
                Heartbeat
            </button>
            <button class="view-btn" data-view="blobs" onclick="switchView('blobs')">
                Happy Blobs
            </button>
        </div>

        <!-- View Container -->
        <div class="view-container" id="viewContainer">
            <!-- Loading State -->
            <div id="loadingState" class="loading">
                <div class="spinner"></div>
                <p>Loading farm vitality data...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error" style="display: none;">
                <h2>Error Loading Data</h2>
                <p id="errorMessage"></p>
                <button class="nav-btn" onclick="location.reload()">Retry</button>
            </div>

            <!-- Rings View -->
            <canvas id="ringsCanvas" class="view-canvas" width="1400" height="900"></canvas>

            <!-- Heartbeat View -->
            <canvas id="heartbeatCanvas" class="view-canvas" width="1400" height="900"></canvas>

            <!-- Happy Blobs View -->
            <canvas id="blobsCanvas" class="view-canvas" width="1400" height="900"></canvas>
        </div>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar" style="display: none;">
            <div class="last-updated">
                Last updated: <span id="lastUpdated">--</span>
            </div>
            <div class="overall-score">
                Farm Health: <span id="overallScore">--</span>/100
            </div>
            <div class="data-freshness">
                <div class="freshness-indicator">
                    <span class="freshness-dot" id="envDot"></span>
                    <span>Env</span>
                </div>
                <div class="freshness-indicator">
                    <span class="freshness-dot" id="nutrientDot"></span>
                    <span>Nutrients</span>
                </div>
                <div class="freshness-indicator">
                    <span class="freshness-dot" id="inventoryDot"></span>
                    <span>Inventory</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h2>Dashboard Settings</h2>
        
        <div class="settings-group">
            <h3>Screensaver Mode</h3>
            <div class="setting-item checkbox-item">
                <input type="checkbox" id="screensaverEnabled" onchange="saveSettings()">
                <label for="screensaverEnabled">Enable screensaver mode</label>
            </div>
            <div class="setting-item">
                <label for="screensaverDelay">Inactivity delay (seconds)</label>
                <input type="number" id="screensaverDelay" value="120" min="30" max="600" onchange="saveSettings()">
            </div>
            <div class="setting-item">
                <label for="screensaverRotation">Rotation interval (seconds)</label>
                <input type="number" id="screensaverRotation" value="30" min="10" max="300" onchange="saveSettings()">
            </div>
        </div>

        <div class="settings-group">
            <h3>Active Views</h3>
            <div class="checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="viewRingsEnabled" checked onchange="saveSettings()">
                    <label for="viewRingsEnabled">Living Rings (Professional)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="viewHeartbeatEnabled" checked onchange="saveSettings()">
                    <label for="viewHeartbeatEnabled">Farm Heartbeat (Precision)</label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="viewBlobsEnabled" checked onchange="saveSettings()">
                    <label for="viewBlobsEnabled">Happy Blobs (Kid-Friendly)</label>
                </div>
            </div>
        </div>

        <div class="settings-group">
            <h3>Data Refresh</h3>
            <div class="setting-item">
                <label for="refreshInterval">Update interval (seconds)</label>
                <input type="number" id="refreshInterval" value="5" min="1" max="60" onchange="saveSettings()">
            </div>
            <div class="setting-item checkbox-item">
                <input type="checkbox" id="showStalenessWarnings" checked onchange="saveSettings()">
                <label for="showStalenessWarnings">Show staleness warnings</label>
            </div>
        </div>

        <div class="settings-group">
            <h3>Performance</h3>
            <div class="setting-item">
                <label for="targetFPS">Target FPS</label>
                <select id="targetFPS" onchange="saveSettings()">
                    <option value="60">60 FPS (Smooth)</option>
                    <option value="30" selected>30 FPS (Balanced)</option>
                    <option value="15">15 FPS (Battery Saver)</option>
                </select>
            </div>
        </div>

        <button class="nav-btn" onclick="closeSettings()" style="width: 100%; margin-top: 2rem;">
            Close Settings
        </button>
    </div>

    <script src="/js/farm-vitality.js"></script>
</body>
</html>
