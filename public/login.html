<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Light Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #0a0f1e;
            --dark-surface: #111827;
            --dark-surface-2: #1a2332;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-blue-light: #60a5fa;
            --accent-green: #10b981;
            --accent-green-light: #6ee7b7;
            --accent-green-dark: #059669;
            --border-dark: #2d3748;
            --glow-green: 0 0 20px rgba(16, 185, 129, 0.5), 0 0 40px rgba(16, 185, 129, 0.3);
            --glow-blue: 0 0 20px rgba(59, 130, 246, 0.5), 0 0 40px rgba(59, 130, 246, 0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .login-container {
            background: var(--dark-surface);
            border: 2px solid var(--accent-green);
            border-radius: 20px;
            box-shadow: var(--glow-green);
            max-width: 450px;
            width: 100%;
            padding: 48px 40px;
            animation: fadeIn 0.5s ease-out;
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-green-light);
            text-shadow: var(--glow-green);
            margin-bottom: 8px;
        }
        
        .tagline {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        h1 {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark-surface-2);
            border: 2px solid var(--border-dark);
            border-radius: 8px;
            font-size: 16px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: var(--dark-surface);
        }
        
        input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green-light);
            border: 2px solid var(--accent-green);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: var(--glow-green);
        }
        
        .btn-login:hover:not(:disabled) {
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.7), 0 0 60px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
        }
        
        .alert.success {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green-light);
            border: 1px solid var(--accent-green);
            display: block;
        }
        
        .alert.error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid #ef4444;
            display: block;
        }
        
        .help-links {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border-dark);
            text-align: center;
            font-size: 14px;
        }
        
        .help-links a {
            color: var(--accent-blue-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .help-links a:hover {
            color: var(--accent-blue);
            text-shadow: var(--glow-blue);
        }

        .help-links span {
            color: var(--text-secondary);
        }
        
        .new-account-notice {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--accent-green);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--accent-green-light);
        }
        
        .new-account-notice strong {
            display: block;
            margin-bottom: 4px;
            color: var(--accent-green-light);
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">Light Engine</div>
            <div class="tagline">Smart Grow Room Management</div>
        </div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to access your farm dashboard</p>
        
        <!-- New account notice (shown if redirected from purchase) -->
        <div id="newAccountNotice" class="new-account-notice" style="display: none;">
            <strong>🎉 Account Created!</strong>
            Check your email for login credentials. They should arrive within 2-3 minutes.
        </div>
        
        <!-- Alert messages -->
        <div id="alertMessage" class="alert"></div>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="farmId">Farm ID</label>
                <input 
                    type="text" 
                    id="farmId" 
                    name="farmId" 
                    placeholder="GR-12345" 
                    required 
                    autocomplete="off"
                >
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="your@email.com" 
                    required 
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required 
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn-login" id="loginButton">
                Sign In
            </button>
        </form>
        
        <div class="help-links">
            <a href="mailto:info@greenreachfarms.com?subject=Login%20Help">Need help signing in?</a>
            <span style="color: #cbd5e0; margin: 0 8px;">•</span>
            <a href="/purchase.html">Purchase a Plan</a>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        if (localStorage.getItem('token')) {
            // Cloud users go to farm-admin, edge users go to LE-dashboard
            const planType = localStorage.getItem('planType') || 'cloud';
            window.location.href = planType === 'cloud' ? '/farm-admin.html' : '/LE-dashboard.html';
        }
        
        // Check if redirected from successful purchase
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('new') === 'true') {
            document.getElementById('newAccountNotice').style.display = 'block';
        }
        
        async function handleLogin(event) {
            event.preventDefault();
            
            const button = document.getElementById('loginButton');
            const alertDiv = document.getElementById('alertMessage');
            const farmId = document.getElementById('farmId').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // Disable button
            button.disabled = true;
            button.textContent = 'Signing in...';
            alertDiv.style.display = 'none';
            
            try {
                // Call backend authentication API
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ farm_id: farmId, email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Login failed');
                }
                
                // Clear stale localStorage to prevent cached farm identity issues
                localStorage.removeItem('token');
                localStorage.removeItem('auth_token');
                localStorage.removeItem('farmId');
                localStorage.removeItem('farm_id');
                localStorage.removeItem('farmName');
                localStorage.removeItem('farm_name');
                localStorage.removeItem('planType');
                localStorage.removeItem('plan_type');
                localStorage.removeItem('role');
                localStorage.removeItem('email');
                
                // Store token and farm info (standardized to 'token' key)
                localStorage.setItem('token', data.token);
                localStorage.setItem('farmId', data.farmId);
                localStorage.setItem('farmName', data.farmName || '');
                localStorage.setItem('email', email);
                localStorage.setItem('role', data.role || 'admin');
                localStorage.setItem('planType', data.planType || 'cloud'); // Store plan type for wizard
                
                console.log('[Login] Stored planType:', data.planType);
                
                // Check if setup is complete before redirecting
                const setupResponse = await fetch('/api/setup-wizard/status', {
                    headers: { 'Authorization': `Bearer ${data.token}` }
                });
                
                const setupData = await setupResponse.json();
                
                // Show success message
                alertDiv.className = 'alert success';
                alertDiv.textContent = 'Login successful! Redirecting...';
                alertDiv.style.display = 'block';
                
                setTimeout(() => {
                    // Cloud users always use farm-admin.html (monitoring dashboard)
                    // Edge users use LE-dashboard.html (full hardware control)
                    const planType = data.planType || localStorage.getItem('planType') || 'cloud';
                    
                    if (planType === 'cloud') {
                        // Cloud users: redirect to standalone wizard if setup incomplete
                        if (setupData.success && !setupData.setupCompleted) {
                            window.location.href = '/setup-wizard.html';
                        } else {
                            window.location.href = '/farm-admin.html';
                        }
                    } else {
                        // Edge device - use farm-admin for setup with embedded wizard
                        if (setupData.success && !setupData.setupCompleted) {
                            window.location.href = '/farm-admin.html';
                        } else {
                            window.location.href = '/LE-dashboard.html';
                        }
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                alertDiv.className = 'alert error';
                alertDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                alertDiv.style.display = 'block';
                
                button.disabled = false;
                button.textContent = 'Sign In';
            }
        }
    </script>
</body>
</html>
