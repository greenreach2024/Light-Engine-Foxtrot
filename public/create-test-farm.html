<!DOCTYPE html>
<html>
<head>
  <title>Create Test Farm - AWS</title>
  <style>
    body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
    .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    #output { margin-top: 20px; padding: 20px; background: #f5f5f5; border: 1px solid #ddd; white-space: pre-wrap; font-family: monospace; }
    .success { color: #28a745; }
    .error { color: #dc3545; }
  </style>
</head>
<body>
  <h1>Create Test Farm on AWS</h1>
  <p>This will create a complete test farm (TEST-FARM-001) with:</p>
  <ul>
    <li>1 room, 2 zones, 4 groups, 12 locations</li>
    <li>12 trays with 4 crops from lighting-recipes.json</li>
    <li>Admin user: admin@test-farm.com / test123</li>
  </ul>
  
  <button id="createBtn" class="btn" onclick="createTestFarm()">Create Test Farm</button>
  
  <div id="output"></div>
  
  <script>
    async function createTestFarm() {
      const btn = document.getElementById('createBtn');
      const output = document.getElementById('output');
      
      btn.disabled = true;
      output.innerHTML = 'Creating test farm...';
      
      try {
        const response = await fetch('/api/admin/create-test-farm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        
        const data = await response.json();
        
        if (data.success) {
          output.innerHTML = `<div class="success">
✓ Test Farm Created Successfully!

Farm ID: ${data.farm.id}
Name: ${data.farm.name}
Structure: ${data.farm.structure}
Inventory: ${data.farm.inventory}

Crops:
${data.farm.crops.map(c => '  - ' + c).join('\\n')}

Login Credentials:
  Email: ${data.farm.login.email}
  Password: ${data.farm.login.password}

Access URLs:
  Farm Admin: <a href="/farm-admin.html">farm-admin.html</a>
  Farm Sales: <a href="/farm-sales.html">farm-sales.html</a>
</div>`;
        } else {
          output.innerHTML = `<div class="error">✗ Error: ${data.error || 'Unknown error'}</div>`;
          output.innerHTML += `\\n\\n${JSON.stringify(data, null, 2)}`;
        }
      } catch (error) {
        output.innerHTML = `<div class="error">✗ Request Failed: ${error.message}</div>`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
