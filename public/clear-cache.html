<!DOCTYPE html>
<html>
<head>
    <title>Clear Cache & Logout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0f1e;
            color: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #111827;
            border-radius: 12px;
            border: 2px solid #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        h1 { color: #10b981; margin-bottom: 20px; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { background: #059669; }
        .status { margin-top: 20px; font-size: 14px; color: #6ee7b7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔄 Clear Cache & Logout</h1>
        <p>This will clear all stored data and force a fresh login.</p>
        <button onclick="clearEverything()">Clear All Data & Logout</button>
        <div class="status" id="status"></div>
    </div>
    
    <script>
        function clearEverything() {
            const status = document.getElementById('status');
            
            // Clear localStorage
            localStorage.clear();
            status.innerHTML = '✅ LocalStorage cleared<br>';
            
            // Clear sessionStorage
            sessionStorage.clear();
            status.innerHTML += '✅ SessionStorage cleared<br>';
            
            // Clear cookies
            document.cookie.split(";").forEach(c => {
                document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
            });
            status.innerHTML += '✅ Cookies cleared<br>';
            
            status.innerHTML += '<br>✅ All data cleared! Redirecting to login...';
            
            setTimeout(() => {
                window.location.href = '/farm-admin-login.html';
            }, 2000);
        }
    </script>
</body>
</html>
