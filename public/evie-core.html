<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E.V.I.E. -- Farm Intelligence</title>
  <script src="/auth-guard.js"></script>
  <link rel="stylesheet" href="/styles/evie-core.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--evie-bg-deep); color: var(--evie-text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    a { color: inherit; text-decoration: none; }
    .evie-core-farm-name { font-size: 13px; color: var(--evie-text-secondary); margin-top: 8px; }
    .evie-core-chat-thread { display: none; max-height: 300px; overflow-y: auto; padding: 12px 0; }
    .evie-core-chat-thread.active { display: block; }
    .evie-chat-msg { padding: 6px 0; font-size: 13px; line-height: 1.5; }
    .evie-chat-msg.user { color: var(--evie-sensing); }
    .evie-chat-msg.assistant { color: var(--evie-text); }
    .evie-chat-msg.system { color: var(--evie-text-muted); font-style: italic; font-size: 12px; }

    /* -- Dramatic chat data rendering -------------------------------- */
    .evie-tool-exec {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.15);
      border-radius: 7px;
      margin: 4px 0;
      animation: evieToolSlide 0.35s ease forwards;
    }
    @keyframes evieToolSlide {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .evie-tool-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--evie-vitality);
      animation: evieToolPulse 1.2s ease-in-out infinite;
    }
    .evie-tool-exec.done .evie-tool-dot {
      background: var(--evie-confirming);
      animation: none;
    }
    @keyframes evieToolPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    .evie-tool-name { font-size: 11px; color: var(--evie-text-accent); font-weight: 600; flex: 1; letter-spacing: 0.3px; }
    .evie-tool-check { font-size: 11px; color: var(--evie-confirming); }

    /* -- Data metric row (sensor readings, etc) ---------------------- */
    .evie-data-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 6px 0;
    }
    .evie-data-chip {
      background: rgba(16, 185, 129, 0.06);
      border: 1px solid rgba(16, 185, 129, 0.18);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
    }
    .evie-data-chip-val { color: var(--evie-text); font-weight: 700; font-variant-numeric: tabular-nums; }
    .evie-data-chip-lbl { color: var(--evie-text-muted); font-size: 10px; display: block; margin-top: 1px; letter-spacing: 0.3px; }
    .val-green  { color: var(--evie-vitality); }
    .val-cyan   { color: var(--evie-sensing); }
    .val-amber  { color: var(--evie-alert); }
    .val-red    { color: #ef4444; }

    /* -- Order notification chip ------------------------------------- */
    .evie-order-chip {
      background: rgba(6, 182, 212, 0.06);
      border: 1px solid rgba(6, 182, 212, 0.2);
      border-left: 3px solid var(--evie-sensing);
      border-radius: 7px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 12px;
    }
    .evie-order-chip-id    { font-size: 10px; color: var(--evie-text-muted); margin-bottom: 3px; }
    .evie-order-chip-items { color: var(--evie-text); font-weight: 600; margin-bottom: 3px; }
    .evie-order-chip-meta  { color: var(--evie-text-secondary); font-size: 11px; display: flex; gap: 12px; }

    /* -- Alert chip -------------------------------------------------- */
    .evie-alert-chip {
      border-radius: 7px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 12px;
    }
    .evie-alert-chip.sev-warn   { background: rgba(245,158,11,0.06); border: 1px solid rgba(245,158,11,0.2); border-left: 3px solid #f59e0b; }
    .evie-alert-chip.sev-crit   { background: rgba(239,68,68,0.06);  border: 1px solid rgba(239,68,68,0.2);  border-left: 3px solid #ef4444; }
    .evie-alert-chip.sev-info   { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); border-left: 3px solid var(--evie-vitality); }
    .evie-alert-chip-title { color: var(--evie-text); font-weight: 600; margin-bottom: 3px; }
    .evie-alert-chip-detail { color: var(--evie-text-secondary); line-height: 1.5; }

    /* -- Inventory summary chip -------------------------------------- */
    .evie-inv-chip {
      background: rgba(139,92,246,0.06);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 7px;
      padding: 10px 14px;
      margin: 6px 0;
      font-size: 12px;
    }
    .evie-inv-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(139,92,246,0.08); color: var(--evie-text-secondary); }
    .evie-inv-row:last-child { border-bottom: none; }
    .evie-inv-qty { font-weight: 700; color: var(--evie-text); font-variant-numeric: tabular-nums; }

    /* -- Reply text formatting --------------------------------------- */
    .evie-reply strong { color: var(--evie-text-accent); }
    .evie-reply em     { color: var(--evie-text-secondary); font-style: normal; opacity: 0.85; }
    .evie-reply .evie-num { color: var(--evie-sensing); font-weight: 700; font-variant-numeric: tabular-nums; }

    /* -- Compact layout when embedded in admin iframe -- */
    .evie-core-page.embedded .evie-core-hero {
      padding: 16px 24px 8px;
    }
    .evie-core-page.embedded .evie-orb-container.evie-orb--hero {
      width: 80px; height: 80px;
    }
    .evie-core-page.embedded .evie-orb--hero .evie-orb-core { width: 28px; height: 28px; }
    .evie-core-page.embedded .evie-orb--hero .evie-orb-halo--inner { width: 44px; height: 44px; }
    .evie-core-page.embedded .evie-orb--hero .evie-orb-halo--mid { width: 60px; height: 60px; }
    .evie-core-page.embedded .evie-orb--hero .evie-orb-halo--outer { width: 80px; height: 80px; }
    .evie-core-page.embedded .evie-core-hero-label {
      font-size: 10px;
      margin-top: 8px;
    }
    .evie-core-page.embedded .evie-core-grid {
      padding-top: 12px;
    }
    .evie-core-page.embedded .evie-stats-row {
      margin-bottom: 8px;
    }
    .evie-core-page.embedded .evie-stat-value {
      font-size: 22px;
    }
  </style>
</head>
<body class="evie-core-page">

  <!-- Topbar -->
  <div class="evie-core-topbar">
    <h1>E.V.I.E.</h1>
    <div style="display:flex;gap:16px;align-items:center">
      <a href="/evie-demo.html" target="_blank" rel="noopener" style="font-size:12px;font-weight:700;letter-spacing:0.5px;color:#000;background:linear-gradient(135deg,#10b981,#059669);padding:7px 20px;border-radius:7px;text-decoration:none;box-shadow:0 0 20px rgba(16,185,129,0.5),0 2px 8px rgba(0,0,0,0.3);">E.V.I.E. Demo</a>
      <a href="/faye-demo.html" target="_blank" rel="noopener" style="font-size:12px;font-weight:700;letter-spacing:0.5px;color:#000;background:linear-gradient(135deg,#f59e0b,#d97706);padding:7px 20px;border-radius:7px;text-decoration:none;box-shadow:0 0 20px rgba(245,158,11,0.5),0 2px 8px rgba(0,0,0,0.3);">F.A.Y.E. Demo</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="evie-core-hero">
    <div class="evie-orb-container evie-orb--hero evie-state-idle" id="hero-orb">
      <div class="evie-orb-core"></div>
      <div class="evie-orb-halo evie-orb-halo--inner"></div>
      <div class="evie-orb-halo evie-orb-halo--mid"></div>
      <div class="evie-orb-halo evie-orb-halo--outer"></div>
    </div>
    <div class="evie-core-hero-label">Environmental Vision & Intelligence Engine</div>
    <div class="evie-core-farm-name" id="hero-farm-name"></div>
  </div>

  <!-- Stats Row -->
  <div style="max-width:960px;margin:0 auto;padding:0 24px">
    <div class="evie-stats-row">
      <div class="evie-stat">
        <div class="evie-stat-value" id="stat-rooms">--</div>
        <div class="evie-stat-label">Rooms</div>
      </div>
      <div class="evie-stat">
        <div class="evie-stat-value" id="stat-crops">--</div>
        <div class="evie-stat-label">Crops</div>
      </div>
      <div class="evie-stat">
        <div class="evie-stat-value" id="stat-alerts">--</div>
        <div class="evie-stat-label">Alerts</div>
      </div>
      <div class="evie-stat">
        <div class="evie-stat-value" id="stat-tasks">--</div>
        <div class="evie-stat-label">Tasks</div>
      </div>
    </div>
  </div>

  <!-- Grid -->
  <div class="evie-core-grid">

    <!-- Environment -->
    <div class="evie-core-section">
      <div class="evie-core-section-title">Environment <span class="count" id="section-env-count">0</span></div>
      <div id="section-env">
        <div class="evie-placeholder">Loading environment data...</div>
      </div>
    </div>

    <!-- Active Crops -->
    <div class="evie-core-section">
      <div class="evie-core-section-title">Active Crops <span class="count" id="section-crop-count">0</span></div>
      <div id="section-crops">
        <div class="evie-placeholder">Loading crop data...</div>
      </div>
    </div>

    <!-- Alerts & Risks -->
    <div class="evie-core-section">
      <div class="evie-core-section-title">Alerts <span class="count" id="section-alert-count">0</span></div>
      <div id="section-alerts">
        <div class="evie-placeholder">Checking alerts...</div>
      </div>
    </div>

    <!-- Today's Tasks -->
    <div class="evie-core-section">
      <div class="evie-core-section-title">Tasks <span class="count" id="section-task-count">0</span></div>
      <div id="section-tasks">
        <div class="evie-placeholder">Loading tasks...</div>
      </div>
    </div>

    <!-- Recommendations (full width) -->
    <div class="evie-core-section full-width">
      <div class="evie-core-section-title">Recommendations <span class="count" id="section-rec-count">0</span></div>
      <div id="section-recs">
        <div class="evie-placeholder">No recommendations at this time.</div>
      </div>
    </div>

  </div>

  <!-- Chat Bar -->
  <div class="evie-core-chat-bar">
    <div class="evie-core-chat-thread" id="chat-thread"></div>
    <div class="evie-conv-input-row">
      <input class="evie-conv-input" id="chat-input" placeholder="Ask E.V.I.E. about your farm..." />
      <button class="evie-conv-send" id="chat-send">&#8593;</button>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // Detect if embedded in admin iframe and apply compact layout
    var inIframe = false;
    try { inIframe = window.self !== window.top; } catch (_) { inIframe = true; }
    if (inIframe) {
      document.body.classList.add('embedded');
    }

    var API_BASE = '/api/assistant';
    var conversationId = null;
    var pollTimer = null;

    function getAuthHeaders() {
      var token = localStorage.getItem('token') || sessionStorage.getItem('token')
        || localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
      return token
        ? { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }
        : { 'Content-Type': 'application/json' };
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function timeAgo(ts) {
      if (!ts) return '';
      var ms = Date.now() - new Date(ts).getTime();
      var m = Math.floor(ms / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    function setHeroState(state) {
      var orb = document.getElementById('hero-orb');
      if (!orb) return;
      orb.className = orb.className.replace(/evie-state-\S+/g, '').trim();
      orb.classList.add('evie-state-' + state);
    }

    // ── Load State ───────────────────────────────────────────────

    async function loadState() {
      try {
        var resp = await fetch(API_BASE + '/state', { headers: getAuthHeaders() });
        if (!resp.ok) return;
        var data = await resp.json();
        if (!data.ok) throw new Error(data.error || 'State fetch failed');
        render(data);
      } catch (e) {
        console.warn('[E.V.I.E. Core] State load error:', e.message);
      }
    }

    function render(data) {
      // Hero
      var alertCount = data.alerts || 0;
      if (alertCount > 0) setHeroState('alert');
      else setHeroState('idle');

      var farmNameEl = document.getElementById('hero-farm-name');
      if (farmNameEl && data.farm_name) farmNameEl.textContent = data.farm_name;

      // Stats
      document.getElementById('stat-rooms').textContent = (data.rooms || []).length;
      document.getElementById('stat-crops').textContent = (data.crops || []).length;
      document.getElementById('stat-alerts').textContent = alertCount;
      document.getElementById('stat-tasks').textContent = (data.tasks || []).length;

      // Sections
      renderEnvironment(data.rooms || []);
      renderCrops(data.crops || []);
      renderAlerts(data.alert_items || []);
      renderTasks(data.tasks || []);
      renderRecommendations(data.recommendations || []);
    }

    function renderEnvironment(rooms) {
      var el = document.getElementById('section-env');
      var count = document.getElementById('section-env-count');
      if (count) count.textContent = rooms.length;
      if (!el) return;
      if (rooms.length === 0) { el.innerHTML = '<div class="evie-notice">No room data available.</div>'; return; }
      el.innerHTML = '';
      rooms.forEach(function (r) {
        var sev = 'info';
        if (r.drift && r.drift > 0) sev = r.drift > 2 ? 'high' : 'medium';
        var card = document.createElement('div');
        card.className = 'evie-signal-card signal-' + sev;
        card.innerHTML =
          '<div class="evie-signal-title">' + esc(r.name) + '</div>' +
          '<div class="evie-signal-detail">' +
          (r.temp != null ? 'Temp: ' + r.temp + (r.temp_unit || 'C') + ' ' : '') +
          (r.humidity != null ? 'RH: ' + r.humidity + '% ' : '') +
          '</div>' +
          (r.drift ? '<div class="evie-signal-meta"><span>Drift: ' + r.drift.toFixed(1) + '</span></div>' : '');
        el.appendChild(card);
      });
    }

    function renderCrops(crops) {
      var el = document.getElementById('section-crops');
      var count = document.getElementById('section-crop-count');
      if (count) count.textContent = crops.length;
      if (!el) return;
      if (crops.length === 0) { el.innerHTML = '<div class="evie-notice">No active plantings.</div>'; return; }
      el.innerHTML = '';
      crops.forEach(function (c) {
        var card = document.createElement('div');
        card.className = 'evie-signal-card signal-info';
        card.innerHTML =
          '<div class="evie-signal-title">' + esc(c.name) + '</div>' +
          '<div class="evie-signal-detail">' +
          (c.stage ? esc(c.stage) + ' ' : '') +
          (c.room ? 'in ' + esc(c.room) + ' ' : '') +
          (c.day != null ? '(Day ' + c.day + ')' : '') +
          '</div>' +
          (c.harvest_in != null ? '<div class="evie-signal-meta"><span>Harvest in ~' + c.harvest_in + ' days</span></div>' : '');
        el.appendChild(card);
      });
    }

    function renderAlerts(alerts) {
      var el = document.getElementById('section-alerts');
      var count = document.getElementById('section-alert-count');
      if (count) count.textContent = alerts.length;
      if (!el) return;
      if (alerts.length === 0) { el.innerHTML = '<div class="evie-notice">All systems nominal.</div>'; return; }
      el.innerHTML = '';
      alerts.forEach(function (a) {
        var card = document.createElement('div');
        card.className = 'evie-signal-card signal-' + (a.severity || 'info');
        card.innerHTML =
          '<div class="evie-signal-title">' + esc(a.title) + '</div>' +
          '<div class="evie-signal-detail">' + esc(a.detail) + '</div>' +
          '<div class="evie-signal-meta">' +
          (a.domain ? '<span>' + esc(a.domain) + '</span>' : '') +
          (a.since ? '<span>' + timeAgo(a.since) + '</span>' : '') +
          '</div>';
        el.appendChild(card);
      });
    }

    function renderTasks(tasks) {
      var el = document.getElementById('section-tasks');
      var count = document.getElementById('section-task-count');
      if (count) count.textContent = tasks.length;
      if (!el) return;
      if (tasks.length === 0) { el.innerHTML = '<div class="evie-notice">No tasks for today.</div>'; return; }
      el.innerHTML = '';
      tasks.forEach(function (t) {
        var card = document.createElement('div');
        card.className = 'evie-signal-card signal-info';
        card.innerHTML =
          '<div class="evie-signal-title">' + esc(t.title) + '</div>' +
          '<div class="evie-signal-detail">' + esc(t.detail) + '</div>' +
          (t.score != null ? '<div class="evie-confidence-bar"><div class="evie-confidence-fill" style="width:' + Math.round(t.score * 100) + '%"></div></div>' : '');
        el.appendChild(card);
      });
    }

    function renderRecommendations(recs) {
      var el = document.getElementById('section-recs');
      var count = document.getElementById('section-rec-count');
      if (count) count.textContent = recs.length;
      if (!el) return;
      if (recs.length === 0) { el.innerHTML = '<div class="evie-notice">No recommendations at this time.</div>'; return; }
      el.innerHTML = '';
      recs.forEach(function (r) {
        var card = document.createElement('div');
        card.className = 'evie-signal-card signal-info';
        card.innerHTML =
          '<div class="evie-signal-title">' + esc(r.title) + '</div>' +
          '<div class="evie-signal-detail">' + esc(r.detail) + '</div>' +
          (r.confidence != null ? '<div class="evie-confidence-bar"><div class="evie-confidence-fill" style="width:' + Math.round(r.confidence * 100) + '%"></div></div>' : '');
        el.appendChild(card);
      });
    }

    // ── Chat ─────────────────────────────────────────────────────

    // Detect data patterns in AI reply text and inject rich chips
    function enrichReplyText(text) {
      // Bold numbers with units (temperatures, % humidity, ppm, kg, etc.)
      return text
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<em>$1</em>')
        .replace(/\b(\d+\.?\d*\s*(?:C|%|ppm|kg|g|L|mS|kPa|umol|pH|mm|cm|h|hrs?|days?|min))\b/g,
          '<span class="evie-num">$1</span>');
    }

    // Extract sensor-like metrics from reply text for chip rendering
    function extractMetricChips(text) {
      var chips = [];
      var patterns = [
        { re: /temp(?:erature)?[\s\S]*?(\d+\.?\d*)\s*C/gi,       label: 'Temperature',  unit: 'C',    cls: 'val-green' },
        { re: /humidity[\s\S]*?(\d+\.?\d*)\s*%/gi,               label: 'Humidity',     unit: '%',    cls: 'val-cyan'  },
        { re: /CO2[\s\S]*?(\d+\.?\d*)\s*ppm/gi,                  label: 'CO2',          unit: 'ppm',  cls: 'val-cyan'  },
        { re: /pH[\s\S]*?(\d+\.?\d*)/gi,                          label: 'pH',           unit: '',     cls: 'val-amber' },
        { re: /EC[\s\S]*?(\d+\.?\d*)\s*mS/gi,                    label: 'EC',           unit: 'mS',   cls: 'val-green' },
        { re: /PPFD[\s\S]*?(\d+\.?\d*)/gi,                        label: 'PPFD',         unit: 'umol', cls: 'val-amber' }
      ];
      var seen = {};
      patterns.forEach(function (p) {
        var m = p.re.exec(text);
        if (m && !seen[p.label]) {
          seen[p.label] = true;
          chips.push({ val: m[1] + p.unit, label: p.label, cls: p.cls });
        }
      });
      return chips;
    }

    // Build tool call bar HTML
    function buildToolCallHTML(toolName) {
      var friendlyNames = {
        get_environment_readings: 'Reading environment sensors',
        get_alerts:               'Checking active alerts',
        get_room_status:          'Loading room status',
        get_planting_assignments: 'Fetching active plantings',
        get_scheduled_harvests:   'Reviewing harvest schedule',
        get_inventory_summary:    'Checking inventory levels',
        get_orders:               'Loading incoming orders',
        get_yield_forecast:       'Running yield forecast',
        get_nutrient_status:      'Reading nutrient levels',
        get_dosing_history:       'Loading dosing history',
        get_device_status:        'Checking device health',
        get_daily_todo:           'Loading today\'s tasks',
        get_farm_insights:        'Generating farm insights',
        get_ai_recommendations:   'Identifying recommendations',
        update_target_ranges:     'Applying target ranges',
        set_light_schedule:       'Updating light schedule',
        auto_assign_devices:      'Auto-assigning devices',
        create_planting_assignment:'Creating planting record',
        mark_harvest_complete:    'Marking harvest complete',
        get_cost_analysis:        'Analysing cost margins',
        get_pricing_decisions:    'Reviewing pricing decisions',
        dismiss_alert:            'Dismissing alert'
      };
      var label = friendlyNames[toolName] || toolName.replace(/_/g, ' ');
      return '<div class="evie-tool-exec done">' +
        '<div class="evie-tool-dot"></div>' +
        '<span class="evie-tool-name">' + label + '</span>' +
        '<span class="evie-tool-check">&#10003;</span>' +
        '</div>';
    }

    function addChatMsg(role, text, extra) {
      var thread = document.getElementById('chat-thread');
      if (!thread) return;
      thread.classList.add('active');
      var msg = document.createElement('div');
      msg.className = 'evie-chat-msg ' + role;

      if (role === 'user') {
        msg.innerHTML = '<strong>You:</strong> ' + esc(text);

      } else if (role === 'tool') {
        // Animated tool execution bar (shown before reply arrives)
        msg.innerHTML = buildToolCallHTML(text);

      } else if (role === 'assistant') {
        // Rich formatted reply
        var chips = extractMetricChips(text);
        var chipsHTML = '';
        if (chips.length >= 2) {
          chipsHTML = '<div class="evie-data-row">' +
            chips.map(function (c) {
              return '<div class="evie-data-chip">' +
                '<span class="evie-data-chip-val ' + c.cls + '">' + esc(c.val) + '</span>' +
                '<span class="evie-data-chip-lbl">' + esc(c.label) + '</span>' +
                '</div>';
            }).join('') + '</div>';
        }
        // Check for order data passed via extra
        var orderHTML = '';
        if (extra && extra.orders && extra.orders.length) {
          orderHTML = extra.orders.map(function (o) {
            return '<div class="evie-order-chip">' +
              '<div class="evie-order-chip-id">' + esc(o.id || 'Order') + '</div>' +
              '<div class="evie-order-chip-items">' + esc(o.items) + '</div>' +
              '<div class="evie-order-chip-meta">' +
              '<span>' + esc(o.customer || '') + '</span>' +
              (o.total ? '<span style="color:var(--evie-sensing);font-weight:700;">' + esc(o.total) + '</span>' : '') +
              (o.status ? '<span>' + esc(o.status) + '</span>' : '') +
              '</div></div>';
          }).join('');
        }
        msg.innerHTML = '<strong>E.V.I.E.:</strong> ' +
          '<div class="evie-reply">' + enrichReplyText(esc(text)) + '</div>' +
          chipsHTML + orderHTML;

      } else {
        // system
        msg.innerHTML = '<em>' + esc(text) + '</em>';
      }

      thread.appendChild(msg);
      thread.scrollTop = thread.scrollHeight;
    }

    async function sendChat() {
      var inp = document.getElementById('chat-input');
      var text = (inp.value || '').trim();
      if (!text) return;
      inp.value = '';

      addChatMsg('user', text);
      setHeroState('thinking');

      try {
        var body = { message: text };
        if (conversationId) body.conversation_id = conversationId;

        var resp = await fetch(API_BASE + '/chat', {
          method: 'POST',
          headers: getAuthHeaders(),
          body: JSON.stringify(body)
        });
        var data = await resp.json();
        if (data.ok !== false && data.reply) {
          conversationId = data.conversation_id || conversationId;
          // Show tool calls as dramatic execution bars
          if (data.tool_calls && data.tool_calls.length > 0) {
            data.tool_calls.forEach(function (t) {
              var toolName = t.name || t.tool || 'unknown';
              addChatMsg('tool', toolName);
            });
          }
          addChatMsg('assistant', data.reply);
          setHeroState('explaining');
          setTimeout(function () { setHeroState('idle'); }, 3000);
        } else {
          addChatMsg('system', 'Error: ' + (data.error || 'Unknown error'));
          setHeroState('uncertain');
        }
      } catch (e) {
        addChatMsg('system', 'Connection error.');
        setHeroState('offline');
        setTimeout(function () { setHeroState('idle'); }, 5000);
      }
    }

    // ── Init ─────────────────────────────────────────────────────

    var inp = document.getElementById('chat-input');
    var btn = document.getElementById('chat-send');
    if (inp) inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });
    if (btn) btn.addEventListener('click', sendChat);

    loadState();
    pollTimer = setInterval(loadState, 30000);
  })();
  </script>
</body>
</html>
