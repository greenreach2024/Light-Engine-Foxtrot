<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>VPD Automation Dashboard</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.foxtrot.css">
  <link rel="stylesheet" href="./styles/le-dashboard-theme.css?v=2025-12-20-01">
  <link rel="stylesheet" href="./components/vpd-dashboard.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #0b1220;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .page {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    main {
      flex: 1;
      overflow: auto;
      padding: 12px;
    }
  </style>
</head>
<body class="le-theme">
  <div class="page">
    <header>
      <img src="./favicon.svg" alt="" width="20" height="20" />
      <h1>VPD Automation</h1>
      <span id="status" class="tiny" aria-live="polite"></span>
    </header>
    <main>
      <div id="vpd-dashboard-root"></div>
    </main>
  </div>

  <script type="module">
    import VpdDashboard from './components/vpd-dashboard.js';

    const root = document.getElementById('vpd-dashboard-root');
    const dash = new VpdDashboard({
      apiBaseUrl: '/api/automation/vpd',
      pollIntervalMs: 5000
    });
    root.appendChild(dash.el);

    // Simple status indicator
    async function refreshStatus() {
      try {
        const res = await fetch('/api/automation/vpd/status');
        const data = await res.json();
        const el = document.getElementById('status');
        if (data?.success) {
          el.textContent = `Initialized: ${data.initialized ? 'Yes' : 'No'} · Enabled: ${data.enabled ? 'On' : 'Off'}`;
        } else {
          el.textContent = 'Unavailable';
        }
      } catch (e) {
        document.getElementById('status').textContent = 'Error contacting server';
      }
    }
    refreshStatus();
    setInterval(refreshStatus, 10000);
  </script>
</body>
</html>
