<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Light Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      max-width: 440px;
      width: 100%;
      padding: 48px 40px;
      animation: slideUp 0.4s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo h1 {
      font-size: 32px;
      color: #10b981;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .logo p {
      color: #6b7280;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #374151;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      transition: all 0.2s;
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: #10b981;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .form-group input::placeholder {
      color: #9ca3af;
    }

    .error-message {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .error-message.show {
      display: flex;
    }

    .error-message::before {
      content: "⚠";
      font-size: 18px;
    }

    .login-button {
      width: 100%;
      padding: 14px;
      background: #10b981;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .login-button:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    .login-button .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .login-button.loading .button-text {
      display: none;
    }

    .login-button.loading .spinner {
      display: block;
    }

    .forgot-password {
      text-align: center;
      margin-top: 20px;
    }

    .forgot-password a {
      color: #10b981;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-password a:hover {
      color: #059669;
      text-decoration: underline;
    }

    .divider {
      margin: 32px 0;
      text-align: center;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      background: white;
      padding: 0 16px;
      color: #6b7280;
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .new-account {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }

    .new-account a {
      color: #10b981;
      text-decoration: none;
      font-weight: 600;
      margin-left: 4px;
    }

    .new-account a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 32px 24px;
      }

      .logo h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>Light Engine</h1>
      <p>Sign in to your farm dashboard</p>
    </div>

    <form id="loginForm">
      <div class="error-message" id="errorMessage"></div>

      <div class="form-group">
        <label for="farmId">Farm ID</label>
        <input 
          type="text" 
          id="farmId" 
          name="farmId" 
          placeholder="FARM-XXXXXXXXXXXX"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="your@email.com"
          required
          autocomplete="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-button" id="loginButton">
        <span class="button-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="forgot-password">
        <a href="#" id="forgotPassword">Forgot your password?</a>
      </div>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <div class="new-account">
      Don't have an account?
      <a href="/landing-purchase.html">Get started</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const loginButton = document.getElementById('loginButton');
    const forgotPassword = document.getElementById('forgotPassword');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const farmId = document.getElementById('farmId').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!farmId || !email || !password) {
        showError('Please fill in all fields');
        return;
      }

      setLoading(true);
      hideError();

      try {
        const response = await fetch('/api/farm/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            farm_id: farmId,
            email,
            password
          })
        });

        const data = await response.json();

        if (response.ok && data.status === 'success') {
          localStorage.setItem('auth_token', data.token);
          localStorage.setItem('farm_id', data.farmId);
          localStorage.setItem('farm_name', data.farmName || '');
          localStorage.setItem('plan_type', data.planType || 'cloud');
          
          // Check if this is first-time login
          if (data.firstLogin) {
            window.location.href = '/setup-wizard.html';
          } else {
            window.location.href = '/farm-admin.html';
          }
        } else {
          showError(data.message || 'Login failed. Please check your credentials.');
          setLoading(false);
        }
      } catch (error) {
        console.error('Login error:', error);
        showError('Unable to connect to server. Please try again.');
        setLoading(false);
      }
    });

    forgotPassword.addEventListener('click', (e) => {
      e.preventDefault();
      showError('Password reset is not yet implemented. Please contact info@greenreachfarms.com for assistance.');
    });

    function showError(message) {
      errorMessage.textContent = message;
      errorMessage.classList.add('show');
    }

    function hideError() {
      errorMessage.classList.remove('show');
    }

    function setLoading(loading) {
      if (loading) {
        loginButton.classList.add('loading');
        loginButton.disabled = true;
      } else {
        loginButton.classList.remove('loading');
        loginButton.disabled = false;
      }
    }

    // Auto-fill from URL parameters (from welcome email)
    const urlParams = new URLSearchParams(window.location.search);
    const farmIdParam = urlParams.get('farmId');
    const emailParam = urlParams.get('email');
    
    if (farmIdParam) {
      document.getElementById('farmId').value = farmIdParam;
    }
    if (emailParam) {
      document.getElementById('email').value = emailParam;
    }
    
    // Focus first empty field
    if (farmIdParam && emailParam) {
      document.getElementById('password').focus();
    } else if (farmIdParam) {
      document.getElementById('email').focus();
    } else {
      document.getElementById('farmId').focus();
    }
  </script>
</body>
</html>
