<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Discovery - Light Engine</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    
    .header h1 {
      font-size: 28px;
      color: #1a202c;
      margin-bottom: 8px;
    }
    
    .header p {
      color: #718096;
      font-size: 14px;
    }
    
    .controls {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 12px;
      align-items: center;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #d1d5db;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }
    
    .status {
      flex: 1;
      text-align: right;
      font-size: 14px;
      color: #4b5563;
    }
    
    .status.scanning {
      color: #10b981;
      font-weight: 600;
    }
    
    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    
    .device-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s;
    }
    
    .device-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
    }
    
    .device-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .device-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }
    
    .device-icon.offline {
      background: linear-gradient(135deg, #6b7280 0%, #4b5563 100%);
    }
    
    .device-info {
      flex: 1;
    }
    
    .device-name {
      font-size: 18px;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 4px;
    }
    
    .device-host {
      font-size: 13px;
      color: #718096;
      font-family: 'Courier New', monospace;
    }
    
    .device-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .device-status.online {
      background: #d1fae5;
      color: #065f46;
    }
    
    .device-status.offline {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .device-details {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }
    
    .detail-label {
      color: #6b7280;
      font-weight: 500;
    }
    
    .detail-value {
      color: #1a202c;
      font-family: 'Courier New', monospace;
      font-size: 12px;
    }
    
    .device-actions {
      margin-top: 16px;
      display: flex;
      gap: 8px;
    }
    
    .btn-small {
      padding: 8px 16px;
      font-size: 13px;
      flex: 1;
    }
    
    .empty-state {
      background: white;
      border-radius: 12px;
      padding: 60px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }
    
    .empty-state svg {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      color: #d1d5db;
    }
    
    .empty-state h3 {
      font-size: 20px;
      color: #1a202c;
      margin-bottom: 8px;
    }
    
    .empty-state p {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a202c;
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s;
      z-index: 1000;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    @media (max-width: 768px) {
      .devices-grid {
        grid-template-columns: 1fr;
      }
      
      .controls {
        flex-direction: column;
        align-items: stretch;
      }
      
      .status {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Device Discovery</h1>
      <p>Automatically discover Light Engine devices on your local network</p>
    </div>
    
    <div class="controls">
      <button class="btn btn-primary" id="discoverBtn">
        <span id="scanIcon">🔍</span>
        <span id="btnText">Start Discovery</span>
      </button>
      <button class="btn btn-secondary" id="refreshBtn">
        🔄 Refresh
      </button>
      <div class="status" id="status">Ready to scan</div>
    </div>
    
    <div id="devicesContainer">
      <div class="empty-state">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <h3>No Devices Found</h3>
        <p>Click "Start Discovery" to search for Light Engine devices on your local network. Make sure devices are powered on and connected to the same network.</p>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    let isScanning = false;
    let discoveredDevices = [];
    let pollInterval = null;
    
    const discoverBtn = document.getElementById('discoverBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const status = document.getElementById('status');
    const devicesContainer = document.getElementById('devicesContainer');
    const scanIcon = document.getElementById('scanIcon');
    const btnText = document.getElementById('btnText');
    
    // Start discovery
    discoverBtn.addEventListener('click', async () => {
      if (isScanning) {
        stopDiscovery();
      } else {
        startDiscovery();
      }
    });
    
    // Refresh
    refreshBtn.addEventListener('click', async () => {
      try {
        const response = await fetch('/api/mdns/refresh', { method: 'POST' });
        const data = await response.json();
        
        if (data.ok) {
          showToast('Discovery restarted');
          discoveredDevices = [];
          renderDevices();
          setTimeout(() => loadDevices(), 1000);
        }
      } catch (error) {
        showToast('Refresh failed: ' + error.message, 'error');
      }
    });
    
    async function startDiscovery() {
      try {
        isScanning = true;
        discoverBtn.disabled = true;
        status.textContent = 'Starting discovery...';
        status.className = 'status scanning';
        
        const response = await fetch('/api/mdns/discover');
        const data = await response.json();
        
        if (!data.ok) {
          throw new Error(data.error || 'Discovery failed');
        }
        
        discoveredDevices = data.services || [];
        renderDevices();
        
        // Update button
        scanIcon.innerHTML = '<div class="spinner"></div>';
        btnText.textContent = 'Stop Discovery';
        discoverBtn.disabled = false;
        status.textContent = 'Scanning for devices...';
        
        // Poll for updates
        pollInterval = setInterval(loadDevices, 3000);
        
        showToast('Discovery started');
      } catch (error) {
        console.error('Discovery error:', error);
        showToast('Discovery failed: ' + error.message, 'error');
        isScanning = false;
        discoverBtn.disabled = false;
        status.textContent = 'Discovery failed';
        status.className = 'status';
      }
    }
    
    function stopDiscovery() {
      isScanning = false;
      
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      
      scanIcon.textContent = '🔍';
      btnText.textContent = 'Start Discovery';
      status.textContent = `Found ${discoveredDevices.length} device(s)`;
      status.className = 'status';
      
      showToast('Discovery stopped');
    }
    
    async function loadDevices() {
      try {
        const response = await fetch('/api/mdns/services');
        const data = await response.json();
        
        if (data.ok) {
          discoveredDevices = data.services || [];
          renderDevices();
        }
      } catch (error) {
        console.error('Load devices error:', error);
      }
    }
    
    function renderDevices() {
      if (discoveredDevices.length === 0) {
        devicesContainer.innerHTML = `
          <div class="empty-state">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <h3>${isScanning ? 'Searching...' : 'No Devices Found'}</h3>
            <p>${isScanning ? 'Looking for Light Engine devices on your network. This may take a few moments.' : 'Click "Start Discovery" to search for Light Engine devices on your local network.'}</p>
          </div>
        `;
        return;
      }
      
      const html = `
        <div class="devices-grid">
          ${discoveredDevices.map(device => `
            <div class="device-card">
              <div class="device-header">
                <div class="device-icon ${device.status}">
                  ${device.status === 'online' ? '💡' : '💤'}
                </div>
                <div class="device-info">
                  <div class="device-name">${device.name}</div>
                  <div class="device-host">${device.host}</div>
                </div>
                <span class="device-status ${device.status}">${device.status}</span>
              </div>
              
              <div class="device-details">
                <div class="detail-row">
                  <span class="detail-label">Port:</span>
                  <span class="detail-value">${device.port}</span>
                </div>
                ${device.addresses && device.addresses.length > 0 ? `
                  <div class="detail-row">
                    <span class="detail-label">IP Address:</span>
                    <span class="detail-value">${device.addresses[0]}</span>
                  </div>
                ` : ''}
                ${device.txt && device.txt.version ? `
                  <div class="detail-row">
                    <span class="detail-label">Version:</span>
                    <span class="detail-value">${device.txt.version}</span>
                  </div>
                ` : ''}
                ${device.txt && device.txt.platform ? `
                  <div class="detail-row">
                    <span class="detail-label">Platform:</span>
                    <span class="detail-value">${device.txt.platform}</span>
                  </div>
                ` : ''}
                <div class="detail-row">
                  <span class="detail-label">Discovered:</span>
                  <span class="detail-value">${new Date(device.discoveredAt).toLocaleTimeString()}</span>
                </div>
              </div>
              
              <div class="device-actions">
                <button class="btn btn-primary btn-small" onclick="openDevice('${device.url}')">
                  Open Dashboard
                </button>
                <button class="btn btn-secondary btn-small" onclick="pingDevice('${device.url}')">
                  Test Connection
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      
      devicesContainer.innerHTML = html;
    }
    
    function openDevice(url) {
      window.open(url, '_blank');
    }
    
    async function pingDevice(url) {
      try {
        showToast('Testing connection...');
        const response = await fetch(url + '/api/health', {
          method: 'GET',
          mode: 'no-cors'
        });
        showToast('Device is responding!', 'success');
      } catch (error) {
        showToast('Connection failed: ' + error.message, 'error');
      }
    }
    
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (pollInterval) {
        clearInterval(pollInterval);
      }
    });
  </script>
</body>
</html>
