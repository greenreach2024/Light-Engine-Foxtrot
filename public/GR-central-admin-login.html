<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GreenReach Central</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0f1e;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --border: #2d3748;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 24px;
            color: var(--accent-blue);
            margin-bottom: 8px;
        }

        .logo p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        .button {
            width: 100%;
            padding: 12px 16px;
            background: var(--accent-blue);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .button:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
        }

        .help-text {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .security-notice {
            margin-top: 30px;
            padding: 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .security-notice strong {
            color: var(--accent-blue);
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 GreenReach Central</h1>
            <p>Administrative Portal</p>
        </div>

        <div id="alert" class="alert"></div>
        
        <!-- Debug log panel -->
        <div id="debug-log" style="position: fixed; top: 10px; right: 10px; width: 450px; max-height: 90vh; overflow-y: auto; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 10px; padding: 15px; border: 3px solid #0f0; border-radius: 8px; z-index: 99999; box-shadow: 0 0 20px rgba(0,255,0,0.5);">
            <div style="color: #ff0; margin-bottom: 10px; font-weight: bold; font-size: 14px; border-bottom: 1px solid #0f0; padding-bottom: 5px;">🔍 DEBUG LOG - DO NOT CLOSE</div>
            <div id="debug-content"></div>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="admin@greenreach.com" 
                    required 
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password" 
                    required 
                    autocomplete="current-password"
                >
            </div>

            <div class="form-group">
                <label for="mfa_code">Two-Factor Code (Optional)</label>
                <input 
                    type="text" 
                    id="mfa_code" 
                    name="mfa_code" 
                    placeholder="000000" 
                    maxlength="6"
                    pattern="[0-9]{6}"
                    autocomplete="one-time-code"
                >
                <div class="help-text">Enter 6-digit code from your authenticator app (if 2FA is enabled)</div>
            </div>

            <button type="submit" class="button" id="login-button">
                Login to Admin Portal
            </button>
        </form>

        <div class="security-notice">
            <strong>🛡️ Security Notice:</strong> This is a restricted area. All access is logged and monitored. Unauthorized access attempts will be reported.
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        const form = document.getElementById('login-form');
        const alertDiv = document.getElementById('alert');
        const loginButton = document.getElementById('login-button');
        const debugLogEl = document.getElementById('debug-log');
        const debugContent = document.getElementById('debug-content');
        
        // Debug logger that writes to screen AND console
        window.log = function(msg, color = '#0f0') {
            console.log(msg);
            const line = document.createElement('div');
            line.style.color = color;
            line.style.marginBottom = '3px';
            line.style.wordBreak = 'break-all';
            line.style.fontSize = '11px';
            line.style.lineHeight = '1.4';
            const timestamp = new Date().toISOString().substr(11, 12);
            line.textContent = `[${timestamp}] ${msg}`;
            debugContent.appendChild(line);
            debugContent.scrollTop = debugContent.scrollHeight;
        };
        
        // Show debug panel
        log('🟢 Debug panel active', '#0f0');
        log('Page: ' + window.location.href, '#fff');
        log('localStorage.admin_token exists: ' + !!localStorage.getItem('admin_token'), '#fff');

        // Check if already logged in
        if (localStorage.getItem('admin_token')) {
            log('⚠️ FOUND EXISTING TOKEN - Auto-redirecting...', '#ff0');
            setTimeout(() => {
                log('→ Redirecting to dashboard now', '#ff0');
                window.location.href = '/GR-central-admin.html';
            }, 1000);
        } else {
            log('✓ No existing token - ready for login', '#0f0');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const mfa_code = document.getElementById('mfa_code').value.trim();

            // Disable button and show loading
            loginButton.disabled = true;
            loginButton.innerHTML = '<span class="loading-spinner"></span>Authenticating...';
            hideAlert();

            try {
                log('═══════════════════════════════════════', '#ff0');
                log('🔐 LOGIN ATTEMPT STARTED', '#ff0');
                log('Email: ' + email, '#fff');
                log('Password length: ' + password.length, '#fff');
                log('Target: ' + API_BASE + '/api/admin/auth/login', '#fff');
                
                const response = await fetch(`${API_BASE}/api/admin/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password, mfa_code })
                });

                log('Response status: ' + response.status, response.ok ? '#0f0' : '#f00');
                log('Response OK: ' + response.ok, response.ok ? '#0f0' : '#f00');
                
                const data = await response.json();
                log('Response data received', '#fff');
                log(JSON.stringify(data, null, 2), '#fff');

                if (response.ok && data.success) {
                    log('✅ LOGIN SUCCESS!', '#0f0');
                    log('Token length: ' + data.token.length, '#0f0');
                    log('Token: ' + data.token.substring(0, 60) + '...', '#888');
                    
                    // Store token
                    log('💾 Storing token in localStorage...', '#0f0');
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_email', data.admin.email);
                    localStorage.setItem('admin_name', data.admin.name);
                    
                    log('✓ Token stored successfully', '#0f0');
                    log('✓ Verify: ' + localStorage.getItem('admin_token').substring(0, 30) + '...', '#888');
                    log('═══════════════════════════════════════', '#ff0');
                    log('⏳ REDIRECTING IN 5 SECONDS...', '#ff0');
                    log('(You can see this log before redirect)', '#ff0');
                    
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    // Redirect after 5 seconds so you can read the log
                    setTimeout(() => {
                        log('🚀 REDIRECT NOW → /GR-central-admin.html', '#ff0');
                        window.location.href = '/GR-central-admin.html';
                    }, 5000);
                } else {
                    // Handle specific error cases
                    let errorMessage = data.error || data.message || 'Login failed';
                    
                    if (response.status === 423) {
                        errorMessage = `Account locked: ${data.message}`;
                    } else if (response.status === 401) {
                        errorMessage = 'Invalid email, password, or 2FA code';
                    } else if (data.requires_2fa) {
                        errorMessage = 'Two-factor authentication code required';
                        document.getElementById('mfa_code').focus();
                    }
                    
                    showAlert(errorMessage, 'error');
                    loginButton.disabled = false;
                    loginButton.innerHTML = 'Login to Admin Portal';
                }
            } catch (error) {
                console.error('Login error:', error);
                showAlert('Network error. Please check your connection and try again.', 'error');
                loginButton.disabled = false;
                loginButton.innerHTML = 'Login to Admin Portal';
            }
        });

        function showAlert(message, type) {
            alertDiv.textContent = message;
            alertDiv.className = `alert alert-${type}`;
            alertDiv.style.display = 'block';
        }

        function hideAlert() {
            alertDiv.style.display = 'none';
        }

        // Auto-focus email field
        document.getElementById('email').focus();

        // Format MFA code input (only allow numbers)
        document.getElementById('mfa_code').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
