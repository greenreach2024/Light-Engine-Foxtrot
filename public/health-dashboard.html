<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #1a202c;
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            color: #718096;
            font-size: 14px;
        }
        
        .overall-status {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .status-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .status-text {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .status-healthy { color: #10b981; }
        .status-degraded { color: #f59e0b; }
        .status-error { color: #ef4444; }
        .status-warning { color: #f59e0b; }
        .status-disabled { color: #9ca3af; }
        
        .checks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .check-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .check-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .check-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f3f4f6;
        }
        
        .check-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a202c;
        }
        
        .check-status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-healthy {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-degraded {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-error {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge-disabled {
            background: #f3f4f6;
            color: #6b7280;
        }
        
        .check-details {
            font-size: 14px;
            color: #4b5563;
        }
        
        .check-details div {
            margin-bottom: 8px;
        }
        
        .check-details strong {
            color: #1a202c;
            font-weight: 600;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 13px;
        }
        
        .actions {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        
        .timestamp {
            text-align: center;
            color: white;
            margin-top: 16px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 System Health Dashboard</h1>
            <div class="subtitle">Real-time monitoring of all system components</div>
        </div>
        
        <div id="loading" class="loading">
            Loading system health data...
        </div>
        
        <div id="dashboard" style="display: none;">
            <div class="overall-status" id="overall-status"></div>
            <div class="checks-grid" id="checks-grid"></div>
            <div class="actions">
                <button onclick="runHealthCheck()">🔄 Refresh Check</button>
                <button onclick="exportReport()">📄 Export Report</button>
                <button onclick="window.location.href='LE-dashboard.html'">← Back to Dashboard</button>
            </div>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>
    
    <script src="health-check.js"></script>
    <script>
        let healthChecker;
        let lastResults;
        
        async function runHealthCheck() {
            const loading = document.getElementById('loading');
            const dashboard = document.getElementById('dashboard');
            
            loading.style.display = 'block';
            dashboard.style.display = 'none';
            
            try {
                if (!healthChecker) {
                    healthChecker = new HealthCheck();
                }
                
                const results = await healthChecker.runAll();
                lastResults = results;
                
                displayResults(results);
                
                loading.style.display = 'none';
                dashboard.style.display = 'block';
                
            } catch (error) {
                console.error('Health check failed:', error);
                loading.innerHTML = `
                    <div style="background: white; padding: 24px; border-radius: 12px; color: #991b1b;">
                        <h2>❌ Health Check Failed</h2>
                        <p style="margin-top: 12px;">${error.message}</p>
                        <button onclick="runHealthCheck()" style="margin-top: 16px;">Retry</button>
                    </div>
                `;
            }
        }
        
        function displayResults(results) {
            // Overall status
            const overallEl = document.getElementById('overall-status');
            const statusIcon = {
                'healthy': '✅',
                'degraded': '⚠️',
                'error': '❌',
                'warning': '⚠️'
            }[results.overall] || '❓';
            
            const statusText = {
                'healthy': 'All Systems Operational',
                'degraded': 'System Degraded',
                'error': 'System Error',
                'warning': 'System Warning'
            }[results.overall] || 'Unknown';
            
            overallEl.innerHTML = `
                <div class="status-icon">${statusIcon}</div>
                <div class="status-text status-${results.overall}">${statusText}</div>
                <div style="color: #718096; font-size: 14px;">
                    Last checked: ${new Date(results.timestamp).toLocaleString()}
                </div>
            `;
            
            // Individual checks
            const checksGrid = document.getElementById('checks-grid');
            checksGrid.innerHTML = '';
            
            const checkNames = {
                edgeServer: '🖥️ Edge Server',
                centralSync: '☁️ Central Sync',
                database: '🗄️ Database',
                sensors: '🌡️ Sensors',
                lights: '💡 Light Controllers',
                network: '🌐 Network',
                dataIntegrity: '📁 Data Integrity'
            };
            
            for (const [key, data] of Object.entries(results.checks)) {
                const card = document.createElement('div');
                card.className = 'check-card';
                
                const badgeClass = `badge-${data.status}`;
                const badgeText = data.status.toUpperCase();
                
                let detailsHtml = '';
                
                if (key === 'edgeServer') {
                    detailsHtml = `
                        <div><strong>Response Time:</strong> ${data.responseTime}ms</div>
                        <div><strong>Uptime:</strong> ${Math.floor(data.uptime / 60)} minutes</div>
                    `;
                } else if (key === 'centralSync') {
                    if (data.status === 'healthy') {
                        detailsHtml = `
                            <div><strong>Last Sync:</strong> ${Math.floor(data.lastSync / 60)} minutes ago</div>
                            <div><strong>Status:</strong> Connected</div>
                        `;
                    } else {
                        detailsHtml = `<div>${data.message}</div>`;
                    }
                } else if (key === 'database') {
                    if (data.status === 'healthy') {
                        detailsHtml = `
                            <div><strong>Mode:</strong> ${data.mode}</div>
                            <div><strong>Latency:</strong> ${data.latencyMs}ms</div>
                        `;
                    } else if (data.status === 'disabled') {
                        detailsHtml = `<div>Database mode disabled</div>`;
                    } else {
                        detailsHtml = `<div>${data.message || 'Connection failed'}</div>`;
                    }
                } else if (key === 'sensors') {
                    if (data.sensors) {
                        const sensorCount = Object.keys(data.sensors).length;
                        const healthySensors = Object.values(data.sensors).filter(s => s.status === 'healthy').length;
                        detailsHtml = `<div><strong>${healthySensors}/${sensorCount}</strong> sensors healthy</div>`;
                        
                        for (const [type, sensor] of Object.entries(data.sensors)) {
                            if (sensor.status === 'healthy') {
                                detailsHtml += `<div>• ${type}: ${sensor.value}${sensor.unit}</div>`;
                            } else if (sensor.status === 'stale') {
                                detailsHtml += `<div>• ${type}: Stale (${sensor.ageMinutes}m old)</div>`;
                            }
                        }
                    } else {
                        detailsHtml = `<div>${data.message}</div>`;
                    }
                } else if (key === 'lights') {
                    if (data.controllers && data.controllers.length > 0) {
                        detailsHtml = `<div><strong>${data.controllers.length}</strong> controllers found</div>`;
                        data.controllers.forEach(ctrl => {
                            const icon = ctrl.reachable ? '✓' : '✗';
                            detailsHtml += `<div>${icon} ${ctrl.ip}:${ctrl.port} (${ctrl.protocol})</div>`;
                        });
                    } else {
                        detailsHtml = `<div>${data.message}</div>`;
                    }
                } else if (key === 'network') {
                    detailsHtml = `<div>${data.message}</div>`;
                } else if (key === 'dataIntegrity') {
                    if (data.files) {
                        const valid = Object.values(data.files).filter(f => f.valid).length;
                        const total = Object.keys(data.files).length;
                        detailsHtml = `<div><strong>${valid}/${total}</strong> files valid</div>`;
                        
                        for (const [file, info] of Object.entries(data.files)) {
                            const icon = info.valid ? '✓' : '✗';
                            detailsHtml += `<div>${icon} ${file}</div>`;
                        }
                    } else {
                        detailsHtml = `<div>${data.message}</div>`;
                    }
                }
                
                let errorHtml = '';
                if (data.error) {
                    errorHtml = `<div class="error-message">${data.error}</div>`;
                }
                
                card.innerHTML = `
                    <div class="check-header">
                        <div class="check-title">${checkNames[key]}</div>
                        <div class="check-status-badge ${badgeClass}">${badgeText}</div>
                    </div>
                    <div class="check-details">
                        ${detailsHtml}
                        ${errorHtml}
                    </div>
                `;
                
                checksGrid.appendChild(card);
            }
            
            document.getElementById('timestamp').textContent = 
                `Last updated: ${new Date().toLocaleString()}`;
        }
        
        function exportReport() {
            if (!lastResults) {
                alert('No health check data available');
                return;
            }
            
            const report = healthChecker.generateTextReport(lastResults);
            
            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `health-check-${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Run health check on page load
        runHealthCheck();
        
        // Auto-refresh every 30 seconds
        setInterval(runHealthCheck, 30000);
    </script>
</body>
</html>
