<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fan Rotation Monitor - Light Engine Charlie</title>
  <link rel="stylesheet" href="../styles/le-dashboard-theme.css?v=2025-12-20-01">
  <link rel="stylesheet" href="/styles/nav-color-palette.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      color: #4ecca3;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      color: #a0a0a0;
      margin-bottom: 30px;
      font-size: 1rem;
    }

    .status-bar {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(78, 204, 163, 0.2);
    }

    .status-item {
      text-align: center;
    }

    .status-label {
      color: #a0a0a0;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }

    .status-value {
      color: #4ecca3;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .status-value.inactive {
      color: #f07167;
    }

    .fan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .fan-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 2px solid rgba(78, 204, 163, 0.2);
      transition: all 0.3s ease;
    }

    .fan-card.active {
      border-color: #4ecca3;
      box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
      background: rgba(78, 204, 163, 0.1);
    }

    .fan-card.overridden {
      border-color: #ffd60a;
      opacity: 0.7;
    }

    .fan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .fan-name {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
    }

    .fan-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-active {
      background: #4ecca3;
      color: #1a1a2e;
    }

    .badge-inactive {
      background: rgba(255, 255, 255, 0.1);
      color: #a0a0a0;
    }

    .badge-overridden {
      background: #ffd60a;
      color: #1a1a2e;
    }

    .zone-label {
      color: #a0a0a0;
      font-size: 0.9rem;
      margin-bottom: 15px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .metric {
      text-align: center;
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
    }

    .metric-label {
      color: #a0a0a0;
      font-size: 0.8rem;
      margin-bottom: 5px;
    }

    .metric-value {
      font-size: 1.8rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
    }

    .metric-trend {
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .trend-rising {
      color: #f07167;
    }

    .trend-falling {
      color: #4ecca3;
    }

    .trend-stable {
      color: #a0a0a0;
    }

    .metric-range {
      font-size: 0.7rem;
      color: #a0a0a0;
      margin-top: 5px;
    }

    .history-section {
      margin-top: 20px;
    }

    .section-title {
      font-size: 1rem;
      color: #4ecca3;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .rotation-history {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid rgba(78, 204, 163, 0.2);
    }

    .history-item {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border-left: 3px solid #4ecca3;
    }

    .history-item:last-child {
      margin-bottom: 0;
    }

    .history-time {
      color: #a0a0a0;
      font-size: 0.85rem;
      margin-bottom: 5px;
    }

    .history-details {
      color: #fff;
      font-size: 0.95rem;
    }

    .refresh-button {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #4ecca3;
      color: #1a1a2e;
      border: none;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(78, 204, 163, 0.4);
      transition: all 0.3s ease;
    }

    .refresh-button:hover {
      background: #3dba8f;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(78, 204, 163, 0.6);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #a0a0a0;
      font-size: 1.2rem;
    }

    .error {
      background: rgba(240, 113, 103, 0.1);
      border: 1px solid #f07167;
      color: #f07167;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .sparkline {
      margin-top: 10px;
      height: 40px;
      position: relative;
    }

    .sparkline-canvas {
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      .fan-grid {
        grid-template-columns: 1fr;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      .status-bar {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
  <link rel="stylesheet" href="/styles/farm-assistant.css">
</head>
<body class="le-theme">
  <div class="container">
    <h1>🌀 Fan Rotation Monitor</h1>
    <p class="subtitle">Real-time monitoring of circulation fan rotation and environmental impact</p>

    <div id="content"></div>
  </div>

  <button class="refresh-button" onclick="loadAnalytics()">
    🔄 Refresh
  </button>

  <script>
    let autoRefreshInterval = null;

    async function loadAnalytics() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading fan rotation analytics...</div>';

      try {
        const response = await fetch('/api/automation/fan-rotation/analytics');
        const data = await response.json();

        if (!data.success) {
          content.innerHTML = `
            <div class="error">
              <strong>Error:</strong> ${data.error || 'Failed to load fan rotation analytics'}
            </div>
          `;
          return;
        }

        renderAnalytics(data);
      } catch (error) {
        content.innerHTML = `
          <div class="error">
            <strong>Connection Error:</strong> ${error.message}
          </div>
        `;
      }
    }

    function renderAnalytics(data) {
      const { status, analytics, rotationHistory, timestamp, nextRotationAt } = data;
      
      const nextRotationSec = status.nextRotationIn ? Math.round(status.nextRotationIn / 1000) : 0;
      const nextRotationMin = Math.floor(nextRotationSec / 60);
      const nextRotationSecRem = nextRotationSec % 60;

      let html = `
        <div class="status-bar">
          <div class="status-item">
            <div class="status-label">Rotation Status</div>
            <div class="status-value ${status.running ? '' : 'inactive'}">
              ${status.enabled && status.running ? 'ACTIVE' : 'INACTIVE'}
            </div>
          </div>
          <div class="status-item">
            <div class="status-label">Active Fan</div>
            <div class="status-value">
              ${status.activeFan ? status.activeFan.name : 'None'}
            </div>
          </div>
          <div class="status-item">
            <div class="status-label">Rotation Interval</div>
            <div class="status-value">
              ${Math.round(status.rotationIntervalMs / 60000)} min
            </div>
          </div>
          <div class="status-item">
            <div class="status-label">Next Rotation</div>
            <div class="status-value">
              ${nextRotationMin}:${String(nextRotationSecRem).padStart(2, '0')}
            </div>
          </div>
        </div>

        <div class="fan-grid">
      `;

      // Render each fan card
      analytics.forEach(fan => {
        const isActive = fan.active;
        const isOverridden = fan.overridden;
        const cardClass = isActive ? 'active' : (isOverridden ? 'overridden' : '');
        const badgeClass = isActive ? 'badge-active' : (isOverridden ? 'badge-overridden' : 'badge-inactive');
        const badgeText = isActive ? 'ACTIVE' : (isOverridden ? 'OVERRIDDEN' : 'STANDBY');

        html += `
          <div class="fan-card ${cardClass}">
            <div class="fan-header">
              <div class="fan-name">${fan.fanName}</div>
              <div class="fan-badge ${badgeClass}">${badgeText}</div>
            </div>
            <div class="zone-label">📍 ${fan.zone}</div>
        `;

        if (fan.current) {
          const tempSummary = fan.summary.tempC;
          const rhSummary = fan.summary.rh;
          const vpdSummary = fan.summary.vpd;

          html += `
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">Temperature</div>
                <div class="metric-value">${fan.current.tempC?.toFixed(1) || '—'}°C</div>
                ${tempSummary.avg ? `
                  <div class="metric-trend trend-${tempSummary.trend}">
                    ${tempSummary.trend === 'rising' ? '↗' : tempSummary.trend === 'falling' ? '↘' : '→'}
                    ${tempSummary.delta > 0 ? '+' : ''}${tempSummary.delta}°C
                  </div>
                  <div class="metric-range">
                    ${tempSummary.min}°C - ${tempSummary.max}°C
                  </div>
                ` : ''}
              </div>

              <div class="metric">
                <div class="metric-label">Humidity</div>
                <div class="metric-value">${fan.current.rh?.toFixed(0) || '—'}%</div>
                ${rhSummary.avg ? `
                  <div class="metric-trend trend-${rhSummary.trend}">
                    ${rhSummary.trend === 'rising' ? '↗' : rhSummary.trend === 'falling' ? '↘' : '→'}
                    ${rhSummary.delta > 0 ? '+' : ''}${rhSummary.delta}%
                  </div>
                  <div class="metric-range">
                    ${rhSummary.min}% - ${rhSummary.max}%
                  </div>
                ` : ''}
              </div>

              <div class="metric">
                <div class="metric-label">VPD</div>
                <div class="metric-value">${fan.current.vpd?.toFixed(2) || '—'}</div>
                ${vpdSummary.avg ? `
                  <div class="metric-trend trend-${vpdSummary.trend}">
                    ${vpdSummary.trend === 'rising' ? '↗' : vpdSummary.trend === 'falling' ? '↘' : '→'}
                    ${vpdSummary.delta > 0 ? '+' : ''}${vpdSummary.delta}
                  </div>
                  <div class="metric-range">
                    ${vpdSummary.min} - ${vpdSummary.max} kPa
                  </div>
                ` : ''}
              </div>
            </div>
          `;

          // Add sparklines if history available
          if (fan.history.tempC.length > 0) {
            html += `
              <div class="sparkline">
                <canvas id="sparkline-${fan.fanId}" class="sparkline-canvas" width="300" height="40"></canvas>
              </div>
            `;
          }
        } else {
          html += `
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">No Data</div>
                <div class="metric-value">—</div>
              </div>
            </div>
          `;
        }

        html += '</div>';
      });

      html += '</div>';

      // Rotation History
      if (rotationHistory && rotationHistory.length > 0) {
        html += `
          <div class="history-section">
            <div class="section-title">Recent Rotation History</div>
            <div class="rotation-history">
        `;

        rotationHistory.slice(0, 10).forEach(event => {
          const timestamp = new Date(event.timestamp || event.timestampISO);
          const timeStr = timestamp.toLocaleTimeString();
          const fanName = event.activeFan?.name || event.fanName || 'Unknown Fan';
          const zone = event.activeFan?.zone || event.zone || '';

          html += `
            <div class="history-item">
              <div class="history-time">${timeStr}</div>
              <div class="history-details">
                Rotated to <strong>${fanName}</strong> ${zone ? `(${zone})` : ''}
              </div>
            </div>
          `;
        });

        html += `
            </div>
          </div>
        `;
      }

      document.getElementById('content').innerHTML = html;

      // Draw sparklines
      analytics.forEach(fan => {
        if (fan.history.tempC.length > 0) {
          drawSparkline(`sparkline-${fan.fanId}`, fan.history.tempC);
        }
      });
    }

    function drawSparkline(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const width = canvas.width;
      const height = canvas.height;

      ctx.clearRect(0, 0, width, height);

      if (!data || data.length < 2) return;

      const values = data.filter(v => v != null && !isNaN(v));
      if (values.length < 2) return;

      const min = Math.min(...values);
      const max = Math.max(...values);
      const range = max - min || 1;

      const xStep = width / (values.length - 1);
      const padding = 2;

      ctx.strokeStyle = '#4ecca3';
      ctx.lineWidth = 2;
      ctx.beginPath();

      values.forEach((value, i) => {
        const x = i * xStep;
        const y = height - padding - ((value - min) / range) * (height - 2 * padding);

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();
    }

    // Auto-refresh every 30 seconds
    function startAutoRefresh() {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
      autoRefreshInterval = setInterval(loadAnalytics, 30000);
    }

    // Initial load
    loadAnalytics();
    startAutoRefresh();

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
      }
    });
  </script>
  <script src="/js/farm-assistant.js"></script>
</body>
</html>
