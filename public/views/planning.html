<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning - Farm Admin</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .merged-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            flex-shrink: 0;
        }
        .merged-header h1 {
            font-size: 15px;
            font-weight: 600;
            color: #94a3b8;
            margin-right: 16px;
            white-space: nowrap;
        }
        .merged-tabs {
            display: flex;
            gap: 4px;
        }
        .merged-tab {
            padding: 7px 18px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .merged-tab:hover {
            background: rgba(59, 130, 246, 0.08);
            color: #e2e8f0;
        }
        .merged-tab.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: #93c5fd;
        }
        .merged-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .merged-content iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #0f172a;
            display: none;
        }
        .merged-content iframe.active {
            display: block;
        }
    </style>

  <link rel="stylesheet" href="/styles/evie-core.css">
<link rel="stylesheet" href="/styles/le-foundation.css">
</head>
<body class="le-theme">
    <div class="merged-header">
        <h1>Planning</h1>
        <div class="merged-tabs">
            <button class="merged-tab active" data-target="scheduler">Planting Scheduler</button>
            <button class="merged-tab" data-target="tray-setup">Tray Setup</button>
        </div>
    </div>
    <div class="merged-content">
        <iframe id="frame-scheduler" class="active" src="/views/planting-scheduler.html"></iframe>
        <iframe id="frame-tray-setup" data-src="/views/tray-setup.html"></iframe>
    </div>
    <script>
    (function() {
        var tabs = document.querySelectorAll('.merged-tab');
        var frames = document.querySelectorAll('.merged-content iframe');
        tabs.forEach(function(tab) {
            tab.addEventListener('click', function() {
                var target = tab.getAttribute('data-target');
                tabs.forEach(function(t) { t.classList.remove('active'); });
                tab.classList.add('active');
                frames.forEach(function(f) {
                    var id = f.id.replace('frame-', '');
                    if (id === target) {
                        if (f.getAttribute('data-src') && !f.src) {
                            f.src = f.getAttribute('data-src');
                            f.removeAttribute('data-src');
                        }
                        f.classList.add('active');
                    } else {
                        f.classList.remove('active');
                    }
                });
            });
        });
        var hash = window.location.hash.slice(1);
        if (hash) {
            var match = document.querySelector('.merged-tab[data-target="' + hash + '"]');
            if (match) match.click();
        }
    })();
    </script>

  <script src="/js/evie-presence.js"></script>
</body>
</html>
