<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Intro Modal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            color: #e5e7eb;
            padding: 40px;
        }
        .test-controls {
            background: #1a2332;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background: #3b82f6;
            border: none;
            padding: 12px 24px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-size: 14px;
        }
        button:hover {
            background: #2563eb;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-controls">
        <h1>Intro Modal Test Page</h1>
        <p>Use these buttons to test the intro modal system:</p>
        
        <button onclick="testModal('farm-summary')">Show Farm Summary Modal</button>
        <button onclick="testModal('farm-inventory')">Show Farm Inventory Modal</button>
        <button onclick="testModal('nutrient-management')">Show Nutrient Management Modal</button>
        <button onclick="clearAllDismissals()">Clear All Dismissals</button>
        <button onclick="showDismissalStatus()">Check Dismissal Status</button>
        
        <div class="status" id="status">Status: Ready</div>
    </div>

    <script src="/js/intro-card.js?v=5"></script>
    <script>
        function updateStatus(msg) {
            document.getElementById('status').innerHTML = msg;
        }

        function testModal(pageId) {
            updateStatus(`Attempting to show modal for: ${pageId}`);
            
            // Check if modal already exists
            const existing = document.getElementById(`intro-modal-overlay-${pageId}`);
            if (existing) {
                updateStatus(`Modal for ${pageId} already exists in DOM! Removing it first...`);
                existing.remove();
            }
            
            showIntroCard(pageId);
            
            // Check if modal was added
            setTimeout(() => {
                const modal = document.getElementById(`intro-modal-overlay-${pageId}`);
                if (modal) {
                    const computedStyle = window.getComputedStyle(modal);
                    updateStatus(`[OK] Modal for ${pageId} is in DOM!<br>
                        Display: ${computedStyle.display}<br>
                        Position: ${computedStyle.position}<br>
                        Z-index: ${computedStyle.zIndex}<br>
                        Opacity: ${computedStyle.opacity}<br>
                        Visibility: ${computedStyle.visibility}<br>
                        Top: ${computedStyle.top}, Left: ${computedStyle.left}<br>
                        Width: ${computedStyle.width}, Height: ${computedStyle.height}`);
                    console.log('Modal element:', modal);
                    console.log('Modal inner HTML length:', modal.innerHTML.length);
                    
                    // Force it to be super visible
                    modal.style.cssText = `
                        position: fixed !important;
                        top: 0 !important;
                        left: 0 !important;
                        right: 0 !important;
                        bottom: 0 !important;
                        background: rgba(255, 0, 0, 0.9) !important;
                        z-index: 999999 !important;
                        display: flex !important;
                        visibility: visible !important;
                        opacity: 1 !important;
                    `;
                    updateStatus(`🔴 Forced modal to be SUPER VISIBLE (red background). If you still don't see it, something is very wrong!`);
                } else {
                    updateStatus(`[ERROR] Modal for ${pageId} was not added to DOM`);
                }
            }, 100);
        }

        function clearAllDismissals() {
            resetIntroCards();
            updateStatus('All dismissals cleared from localStorage');
        }

        function showDismissalStatus() {
            const keys = Object.keys(localStorage).filter(key => key.startsWith('introCard_dismissed_'));
            if (keys.length === 0) {
                updateStatus('No dismissed cards in localStorage');
            } else {
                updateStatus(`Dismissed cards:<br>${keys.map(k => `- ${k}: ${localStorage.getItem(k)}`).join('<br>')}`);
            }
        }

        // Auto-clear on page load for testing
        window.addEventListener('DOMContentLoaded', () => {
            updateStatus('Page loaded. Click buttons to test modals.');
        });
    </script>
</body>
</html>
