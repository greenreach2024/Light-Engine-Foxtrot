<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Test - Modal Fade</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            /* Extension will generate fade-in animation here - Test 2 */
        }
        
        .modal {
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            /* Extension will generate scale animation here - Test 2 */
        }
        
        .trigger-button {
            padding: 12px 24px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <button class="trigger-button" onclick="document.querySelector('.modal-overlay').style.display='flex'">
        Open Modal
    </button>
    
    <div class="modal-overlay" style="display: none;">
        <div class="modal">
            <h2>Test Modal</h2>
            <p>This modal should fade in with scale animation.</p>
            <button class="trigger-button" onclick="this.closest('.modal-overlay').style.display='none'">
                Close
            </button>
        </div>
    </div>
</body>
</html>
