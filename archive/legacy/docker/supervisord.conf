[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nodejs]
command=node server-foxtrot.js
directory=/app
autostart=true
autorestart=true
user=node
stdout_logfile=/app/logs/nodejs.log
stderr_logfile=/app/logs/nodejs_error.log
environment=NODE_ENV="production",PORT="8091",EDGE_MODE="true"

[program:fastapi]
command=python3 -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
user=node
stdout_logfile=/app/logs/fastapi.log
stderr_logfile=/app/logs/fastapi_error.log
environment=PYTHONUNBUFFERED="1"
