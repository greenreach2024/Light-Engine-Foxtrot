<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline - Light Engine</title>
  <link rel="stylesheet" href="/styles/nav-color-palette.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    
    .icon svg {
      width: 60px;
      height: 60px;
      stroke: white;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 18px;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 32px;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .status {
      margin-top: 24px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1l4 4L1 9"></path>
        <path d="M9 9l-4-4"></path>
        <path d="M5 5v4h4"></path>
        <path d="M23 1l-4 4 4 4"></path>
        <path d="M15 9l4-4"></path>
        <path d="M19 5v4h-4"></path>
        <path d="M1 23l4-4-4-4"></path>
        <path d="M9 15l-4 4"></path>
        <path d="M5 19v-4h4"></path>
        <path d="M23 23l-4-4 4-4"></path>
        <path d="M15 15l4 4"></path>
        <path d="M19 19v-4h-4"></path>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Some features may be limited until you're back online.</p>
    
    <a href="/" class="btn">Try Again</a>
    
    <div class="status" id="status">
      Checking connection...
    </div>
  </div>
  
  <script>
    // Check online status periodically
    function checkOnline() {
      const status = document.getElementById('status');
      
      if (navigator.onLine) {
        status.textContent = 'Connection restored! Redirecting...';
        setTimeout(() => {
          window.location.href = '/';
        }, 1000);
      } else {
        status.textContent = 'Still offline. Will retry automatically.';
      }
    }
    
    // Check immediately
    checkOnline();
    
    // Check every 5 seconds
    setInterval(checkOnline, 5000);
    
    // Listen for online event
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
