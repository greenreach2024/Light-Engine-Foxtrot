version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: light-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lightengine
      POSTGRES_USER: lightengine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lightengine -d lightengine"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for rate limiting and caching)
  redis:
    image: redis:7-alpine
    container_name: light-engine-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  python-backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    command: bash -lc "pip install -r requirements.txt && python -m uvicorn backend.server:app --host 0.0.0.0 --port 8000 --workers 1 --timeout-keep-alive 5 --lifespan on"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://lightengine:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/lightengine
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme123}@redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  node-server:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -lc "npm ci || npm install && node server-foxtrot.js"
    environment:
      - NODE_ENV=production
      - PORT=8091
    ports:
      - "8091:8091"
    depends_on:
      python-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/healthz" ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
