[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 921600

lib_deps = 
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5
    Wire

build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DI2C_MASTER_SCL=22
    -DI2C_MASTER_SDA=23
    -DI2C_MASTER_FREQUENCY=400000
